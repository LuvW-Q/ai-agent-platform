<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>页面未找到 - 数据瞭望系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #071425; color: #d7e3fb; font-family: Inter, sans-serif; }
    main { width: min(560px, calc(100% - 32px)); border-left: 3px solid #4cd6ff; padding: 24px 28px; background: #142031; }
    .code { color: #4cd6ff; font-size: 14px; font-weight: 800; }
    h1 { margin: 8px 0 10px; font-size: clamp(26px, 7vw, 42px); letter-spacing: 0; }
    p { margin: 0 0 24px; color: #c3c6d7; line-height: 1.7; }
    a { display: inline-flex; align-items: center; gap: 8px; color: #cbd6ff; background: #0052d9; padding: 10px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    a:focus-visible { outline: 2px solid #4cd6ff; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <div class="code">HTTP 404</div>
    <h1>页面未找到</h1>
    <p>该地址不存在或已被移除。请返回系统入口后从导航中选择需要的功能。</p>
    <a href="/login"><span class="material-symbols-outlined">home</span>返回系统入口</a>
  </main>
</body>
</html>
