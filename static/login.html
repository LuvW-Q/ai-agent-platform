<script>
        const FACE_MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
        let faceModelsReady = false;
        let faceModelsPromise = null;
        let faceStream = null;
        let faceRecognitionEnabled = true;

        async function loadPublicFaceSetting() {
            try {
                const response = await fetch('/api/settings/public');
                if (!response.ok) return;
                const settings = await response.json();
                const setting = settings.find(item => item.key === 'face_recognition_enabled');
                faceRecognitionEnabled = !setting || setting.value === 'true' || setting.value === '1';
                if (!faceRecognitionEnabled) {
                    const button = document.getElementById('faceLoginBtn');
                    button.disabled = true;
                    button.classList.add('opacity-40', 'cursor-not-allowed');
                    button.innerHTML = '<span class="material-symbols-outlined">face</span>人脸识别已关闭';
                }
            } catch (error) {}
        }

        function setFaceStatus(message, tone = 'normal') {
            const status = document.getElementById('faceStatus');
            status.textContent = message;
            status.className = 'mt-md rounded-lg border bg-surface-container-low p-md text-body-md ' + (
                tone === 'success' ? 'border-secondary-container/60 text-secondary' :
                tone === 'error' ? 'border-error/60 text-error' :
                'border-outline-variant/50 text-on-surface-variant'
            );
        }

        function setFaceButtonsDisabled(disabled) {
            document.getElementById('faceRegisterBtn').disabled = disabled;
            document.getElementById('faceVerifyBtn').disabled = disabled;
        }

        async function loadFaceModels() {
            if (faceModelsReady) return;
            if (!window.faceapi) throw new Error('face-api.js 加载失败，请检查网络');
            if (!faceModelsPromise) {
                faceModelsPromise = Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(FACE_MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL)
                ]).then(() => {
                    faceModelsReady = true;
                }).catch(error => {
                    faceModelsPromise = null;
                    throw error;
                });
            }
            await faceModelsPromise;
        }

        async function openFaceModal() {
            if (!faceRecognitionEnabled) {
                showToast('管理员已关闭人脸识别', 'error');
                return;
            }
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                showToast('请先填写登录账号', 'error');
                return;
            }
            const modal = document.getElementById('faceModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setFaceButtonsDisabled(true);
            document.getElementById('faceLoading').classList.remove('hidden');
            setFaceStatus('正在加载模型并申请摄像头权限…');
            try {
                await loadFaceModels();
                faceStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                const video = document.getElementById('faceVideo');
                video.srcObject = faceStream;
                await video.play();
                document.getElementById('faceLoading').classList.add('hidden');
                setFaceButtonsDisabled(false);
                setFaceStatus('摄像头已就绪。请正对镜头，保持光线充足。');
            } catch (error) {
                document.getElementById('faceLoading').textContent = '摄像头或模型加载失败';
                setFaceStatus(error.message, 'error');
            }
        }

        function closeFaceModal() {
            if (faceStream) {
                faceStream.getTracks().forEach(track => track.stop());
                faceStream = null;
            }
            const video = document.getElementById('faceVideo');
            video.srcObject = null;
            const modal = document.getElementById('faceModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function captureFaceDescriptor() {
            if (!faceModelsReady || !faceStream) throw new Error('摄像头尚未就绪');
            setFaceButtonsDisabled(true);
            setFaceStatus('正在检测人脸并计算 128 维特征…');
            try {
                const result = await faceapi
                    .detectSingleFace(document.getElementById('faceVideo'), new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                if (!result) throw new Error('未检测到清晰的单张人脸，请调整位置后重试');
                if (result.descriptor.length !== 128) throw new Error('人脸特征维度不是 128，无法继续');
                return Array.from(result.descriptor);
            } finally {
                setFaceButtonsDisabled(false);
            }
        }

        async function authenticateForFaceRegistration(username) {
            if (Token.exists()) return;
            const password = document.getElementById('passwordInput').value;
            if (!password) throw new Error('首次注册人脸前请填写当前账号密码');
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || '账号密码认证失败');
            Token.set(data);
        }

        async function registerFace() {
            const username = document.getElementById('usernameInput').value.trim();
            try {
                const descriptor = await captureFaceDescriptor();
                await authenticateForFaceRegistration(username);
                await apiPost('/api/auth/face/register', { descriptor });
                Token.clear();
                setFaceStatus(`账号“${username}”的人脸特征已加密保存，可直接刷脸登录。`, 'success');
                showToast('人脸特征注册成功', 'success');
            } catch (error) {
                setFaceStatus(error.message, 'error');
            }
        }

        async function loginWithFace() {
            const username = document.getElementById('usernameInput').value.trim();
            try {
                const descriptor = await captureFaceDescriptor();
                const response = await fetch('/api/auth/face/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, descriptor })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || '人脸登录失败');
                Token.set(data);
                setFaceStatus('人脸验证通过，正在进入系统…', 'success');
                showToast('人脸登录成功', 'success');
                closeFaceModal();
                const target = await resolveLandingPage();
                window.location.href = target;
            } catch (error) {
                setFaceStatus(error.message, 'error');
            }
        }

        // Password Visibility Toggle
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility_off';
            }
        }

        // Register/Login Mode Toggle
        let isRegisterMode = false;
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('emailField').style.display = isRegisterMode ? '' : 'none';
            document.getElementById('submitBtn').innerHTML = isRegisterMode
                ? '<span class="material-symbols-outlined">person_add</span> 注 册'
                : '<span class="material-symbols-outlined">login</span> 登 录';
            document.getElementById('toggleText').textContent = isRegisterMode ? '已有账号？' : '还没有账号？';
            document.getElementById('toggleLink').textContent = isRegisterMode ? '返回登录' : '注册账号';
            // Hide slider for register mode
            document.querySelector('.space-y-sm:nth-of-type(3)').style.display = isRegisterMode ? 'none' : '';
        }

        // Slider verification state
        let sliderVerified = false;

        // Mock Slider Interaction
        const slider = document.getElementById('sliderHandle');
        const sliderBg = document.getElementById('sliderBg');
        let isDragging = false;
        let startX = 0;

        slider.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            slider.style.transition = 'none';
            sliderBg.style.transition = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const container = slider.parentElement;
            const containerWidth = container.offsetWidth;
            const handleWidth = slider.offsetWidth;
            const moveX = Math.max(0, Math.min(e.clientX - startX, containerWidth - handleWidth));
            
            slider.style.left = moveX + 'px';
            sliderBg.style.width = moveX + 'px';

            if (moveX >= containerWidth - handleWidth) {
                isDragging = false;
                slider.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                slider.classList.replace('bg-primary-container', 'bg-secondary-container');
                slider.classList.replace('text-on-primary', 'text-on-secondary-container');
                slider.style.left = (containerWidth - handleWidth) + 'px';
                slider.style.cursor = 'default';
                container.classList.add('border-secondary-container');
                sliderVerified = true;
            }
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            const container = slider.parentElement;
            if (parseInt(slider.style.left) < container.offsetWidth - slider.offsetWidth) {
                slider.style.transition = 'all 0.3s ease';
                sliderBg.style.transition = 'all 0.3s ease';
                slider.style.left = '0px';
                sliderBg.style.width = '0px';
            }
        });

        // Touch Support
        slider.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const container = slider.parentElement;
            const moveX = Math.max(0, Math.min(e.touches[0].clientX - startX, container.offsetWidth - slider.offsetWidth));
            slider.style.left = moveX + 'px';
            sliderBg.style.width = moveX + 'px';
            if (moveX >= container.offsetWidth - slider.offsetWidth) {
                isDragging = false;
                slider.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                slider.classList.replace('bg-primary-container', 'bg-secondary-container');
                slider.classList.replace('text-on-primary', 'text-on-secondary-container');
                sliderVerified = true;
            }
        });
        window.addEventListener('touchend', () => {
             if (!isDragging) return;
             isDragging = false;
             const container = slider.parentElement;
             if (parseInt(slider.style.left) < container.offsetWidth - slider.offsetWidth) {
                slider.style.left = '0px';
                sliderBg.style.width = '0px';
             }
        });

        // Form submission — connect to backend API
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!username || !password) {
                showToast('请填写账号和密码', 'error');
                return;
            }

            if (isRegisterMode) {
                // 注册
                const email = document.getElementById('emailInput').value.trim();
                if (!email) {
                    showToast('请填写邮箱', 'error');
                    return;
                }
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 注册中...';
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, email })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast('注册成功，请登录', 'success');
                        toggleMode(); // 切换回登录模式
                        document.getElementById('usernameInput').value = username;
                    } else {
                        showToast(data.detail || '注册失败', 'error');
                    }
                } catch (err) {
                    showToast('网络错误', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined">person_add</span> 注 册';
            } else {
                // 登录
                if (!sliderVerified) {
                    showToast('请先完成安全验证', 'error');
                    return;
                }
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 登录中...';
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        Token.set(data);
                        showToast('登录成功，正在跳转...', 'success');
                        // 获取服务端返回的精确角色后再决定入口
                        try {
                          const target = await resolveLandingPage();
                          setTimeout(() => window.location.href = target, 800);
                        } catch(e) {
                          showToast(e.message || '登录成功，但未能获取用户角色', 'error');
                          btn.disabled = false;
                          btn.innerHTML = '<span class="material-symbols-outlined">login</span> 登 录';
                        }
                    } else {
                        showToast(data.detail || '登录失败', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-symbols-outlined">login</span> 登 录';
                    }
                } catch (err) {
                    showToast('网络错误', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-symbols-outlined">login</span> 登 录';
                }
            }
        });

        async function resolveLandingPage() {
            const profile = await apiGet('/api/auth/profile');
            const adminRoles = ['ROOT', 'AUDIT', 'OPS'];
            return adminRoles.includes(profile.role) ? '/dashboard' : '/de';
        }

        // 已登录时仍需读取角色，避免普通用户误入管理后台
        if (Token.exists()) {
            resolveLandingPage()
                .then(target => { window.location.href = target; })
                .catch(error => showToast(error.message || '登录状态校验失败', 'error'));
        }
        loadPublicFaceSetting();
    </script>
</body></html>
