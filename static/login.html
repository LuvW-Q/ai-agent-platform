<script src="/static/js/app.js"></script>
<script>
        // Password Visibility Toggle
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility_off';
            }
        }

        // Register/Login Mode Toggle
        let isRegisterMode = false;
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('emailField').style.display = isRegisterMode ? '' : 'none';
            document.getElementById('submitBtn').innerHTML = isRegisterMode
                ? '<span class="material-symbols-outlined">person_add</span> 注 册'
                : '<span class="material-symbols-outlined">login</span> 登 录';
            document.getElementById('toggleText').textContent = isRegisterMode ? '已有账号？' : '还没有账号？';
            document.getElementById('toggleLink').textContent = isRegisterMode ? '返回登录' : '注册账号';
            // Hide slider for register mode
            document.querySelector('.space-y-sm:nth-of-type(3)').style.display = isRegisterMode ? 'none' : '';
        }

        // Slider verification state
        let sliderVerified = false;

        // Mock Slider Interaction
        const slider = document.getElementById('sliderHandle');
        const sliderBg = document.getElementById('sliderBg');
        let isDragging = false;
        let startX = 0;

        slider.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            slider.style.transition = 'none';
            sliderBg.style.transition = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const container = slider.parentElement;
            const containerWidth = container.offsetWidth;
            const handleWidth = slider.offsetWidth;
            const moveX = Math.max(0, Math.min(e.clientX - startX, containerWidth - handleWidth));
            
            slider.style.left = moveX + 'px';
            sliderBg.style.width = moveX + 'px';

            if (moveX >= containerWidth - handleWidth) {
                isDragging = false;
                slider.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                slider.classList.replace('bg-primary-container', 'bg-secondary-container');
                slider.classList.replace('text-on-primary', 'text-on-secondary-container');
                slider.style.left = (containerWidth - handleWidth) + 'px';
                slider.style.cursor = 'default';
                container.classList.add('border-secondary-container');
                sliderVerified = true;
            }
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            const container = slider.parentElement;
            if (parseInt(slider.style.left) < container.offsetWidth - slider.offsetWidth) {
                slider.style.transition = 'all 0.3s ease';
                sliderBg.style.transition = 'all 0.3s ease';
                slider.style.left = '0px';
                sliderBg.style.width = '0px';
            }
        });

        // Touch Support
        slider.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const container = slider.parentElement;
            const moveX = Math.max(0, Math.min(e.touches[0].clientX - startX, container.offsetWidth - slider.offsetWidth));
            slider.style.left = moveX + 'px';
            sliderBg.style.width = moveX + 'px';
            if (moveX >= container.offsetWidth - slider.offsetWidth) {
                isDragging = false;
                slider.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                slider.classList.replace('bg-primary-container', 'bg-secondary-container');
                slider.classList.replace('text-on-primary', 'text-on-secondary-container');
                sliderVerified = true;
            }
        });
        window.addEventListener('touchend', () => {
             if (!isDragging) return;
             isDragging = false;
             const container = slider.parentElement;
             if (parseInt(slider.style.left) < container.offsetWidth - slider.offsetWidth) {
                slider.style.left = '0px';
                sliderBg.style.width = '0px';
             }
        });

        // Form submission — connect to backend API
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!username || !password) {
                showToast('请填写账号和密码', 'error');
                return;
            }

            if (isRegisterMode) {
                // 注册
                const email = document.getElementById('emailInput').value.trim();
                if (!email) {
                    showToast('请填写邮箱', 'error');
                    return;
                }
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 注册中...';
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, email })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast('注册成功，请登录', 'success');
                        toggleMode(); // 切换回登录模式
                        document.getElementById('usernameInput').value = username;
                    } else {
                        showToast(data.detail || '注册失败', 'error');
                    }
                } catch (err) {
                    showToast('网络错误', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined">person_add</span> 注 册';
            } else {
                // 登录
                if (!sliderVerified) {
                    showToast('请先完成安全验证', 'error');
                    return;
                }
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 登录中...';
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        Token.set(data);
                        showToast('登录成功，正在跳转...', 'success');
                        // 获取用户信息判断角色
                        try {
                          const profile = await fetch('/api/auth/profile', { headers: { 'Authorization': 'Bearer ' + Token.access } }).then(r => r.json());
                          const adminRoles = ['ROOT', 'AUDIT', 'OPS'];
                          const target = adminRoles.includes(profile.role) ? '/dashboard' : '/de';
                          setTimeout(() => window.location.href = target, 800);
                        } catch(e) {
                          setTimeout(() => window.location.href = '/dashboard', 800);
                        }
                    } else {
                        showToast(data.detail || '登录失败', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-symbols-outlined">login</span> 登 录';
                    }
                } catch (err) {
                    showToast('网络错误', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-symbols-outlined">login</span> 登 录';
                }
            }
        });

        // 如果已登录，直接跳转
        if (Token.exists()) {
            window.location.href = '/dashboard';
        }
    </script>
</body></html>
