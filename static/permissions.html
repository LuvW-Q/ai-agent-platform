<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>权限管理 — 数据瞭望系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#0b1326", "surface": "#0b1326", "surface-dim": "#0b1326",
        "surface-bright": "#31394d", "surface-container-lowest": "#060e20",
        "surface-container-low": "#131b2e", "surface-container": "#171f33",
        "surface-container-high": "#222a3d", "surface-container-highest": "#2d3449",
        "surface-variant": "#2d3449", "primary": "#adc6ff",
        "on-primary": "#002e6a", "primary-container": "#4d8eff",
        "on-primary-container": "#00285d", "primary-fixed": "#d8e2ff",
        "primary-fixed-dim": "#adc6ff", "secondary": "#4edea3",
        "on-secondary": "#003824", "secondary-container": "#00a572",
        "on-secondary-container": "#00311f", "tertiary": "#ffb786",
        "error": "#ffb4ab", "on-error": "#690005",
        "error-container": "#93000a", "on-error-container": "#ffdad6",
        "outline": "#8c909f", "outline-variant": "#424754",
        "on-surface": "#dae2fd", "on-surface-variant": "#c2c6d6",
        "on-background": "#dae2fd", "inverse-surface": "#dae2fd",
        "inverse-on-surface": "#283044", "inverse-primary": "#005ac2",
      },
      borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
      fontFamily: {
        "display-lg": ["Inter"], "body-md": ["Inter"], "headline-lg": ["Inter"],
        "body-sm": ["Inter"], "headline-md": ["Inter"], "headline-sm": ["Inter"],
        "label-md": ["JetBrains Mono"], "body-lg": ["Inter"], "label-sm": ["JetBrains Mono"]
      },
    }
  }
};
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .fill-icon { font-variation-settings: 'FILL' 1; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #424754; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #8c909f; }
  .tab-btn { transition: all 0.2s; }
  .tab-btn.active { color: #adc6ff; border-bottom-color: #adc6ff; }
  .modal-overlay { background: rgba(0,0,0,0.5); }
</style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">
<aside></aside>
<main class="min-h-screen p-lg">
  <!-- Page Header -->
  <div class="mb-lg">
    <h1 class="font-headline-md text-headline-md font-bold text-on-surface">权限管理</h1>
    <p class="text-body-sm text-on-surface-variant mt-1">用户管理、角色管理、菜单配置与权限树查看</p>
  </div>

  <!-- Tabs -->
  <div class="border-b border-outline-variant mb-lg">
    <nav class="flex gap-6 -mb-px">
      <button class="tab-btn text-sm font-semibold pb-3 px-1 border-b-2 border-primary text-primary" data-tab="users" onclick="switchTab('users')">用户管理</button>
      <button class="tab-btn text-sm font-semibold pb-3 px-1 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface" data-tab="roles" onclick="switchTab('roles')">角色管理</button>
      <button class="tab-btn text-sm font-semibold pb-3 px-1 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface" data-tab="menus" onclick="switchTab('menus')">菜单管理</button>
      <button class="tab-btn text-sm font-semibold pb-3 px-1 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface" data-tab="tree" onclick="switchTab('tree')">权限树</button>
    </nav>
  </div>

  <!-- Tab Content -->
  <div id="tabContent" class="mt-lg">
    <!-- Tab1: 用户管理 -->
    <div id="tab-users" class="tab-panel">
      <div class="flex items-center justify-between mb-md">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
          <input id="user-search" class="bg-surface-container border border-outline-variant rounded-xl pl-10 pr-4 py-2 text-sm w-72 outline-none focus:border-primary" placeholder="搜索用户名或昵称..." oninput="debounceSearch('users', this.value)"/>
        </div>
        <span class="text-xs text-on-surface-variant" id="user-count">共 0 人</span>
      </div>
      <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
        <table class="w-full app-table">
          <thead>
            <tr class="bg-surface-container-high text-xs text-on-surface-variant uppercase tracking-wider">
              <th class="text-left px-4 py-3 font-semibold">ID</th>
              <th class="text-left px-4 py-3 font-semibold">用户名</th>
              <th class="text-left px-4 py-3 font-semibold">昵称</th>
              <th class="text-left px-4 py-3 font-semibold">邮箱</th>
              <th class="text-left px-4 py-3 font-semibold">角色</th>
              <th class="text-left px-4 py-3 font-semibold">状态</th>
              <th class="text-left px-4 py-3 font-semibold">操作</th>
            </tr>
          </thead>
          <tbody id="user-tbody" class="divide-y divide-outline-variant/30">
            <tr><td colspan="7" class="text-center text-outline py-lg">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab2: 角色管理 -->
    <div id="tab-roles" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-md">
        <span class="text-xs text-on-surface-variant" id="role-count">共 0 个角色</span>
        <button class="flex items-center gap-1 px-3 py-1.5 bg-primary text-on-primary text-sm rounded-xl hover:brightness-110 transition-all" onclick="openRoleModal()">
          <span class="material-symbols-outlined text-sm">add</span> 新增角色
        </button>
      </div>
      <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
        <table class="w-full app-table">
          <thead>
            <tr class="bg-surface-container-high text-xs text-on-surface-variant uppercase tracking-wider">
              <th class="text-left px-4 py-3 font-semibold">ID</th>
              <th class="text-left px-4 py-3 font-semibold">名称</th>
              <th class="text-left px-4 py-3 font-semibold">代码</th>
              <th class="text-left px-4 py-3 font-semibold">描述</th>
              <th class="text-left px-4 py-3 font-semibold">状态</th>
              <th class="text-left px-4 py-3 font-semibold">操作</th>
            </tr>
          </thead>
          <tbody id="role-tbody" class="divide-y divide-outline-variant/30">
            <tr><td colspan="6" class="text-center text-outline py-lg">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab3: 菜单管理 -->
    <div id="tab-menus" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-md">
        <span class="text-xs text-on-surface-variant" id="menu-count">共 0 个菜单</span>
        <button class="flex items-center gap-1 px-3 py-1.5 bg-primary text-on-primary text-sm rounded-xl hover:brightness-110 transition-all" onclick="openMenuModal()">
          <span class="material-symbols-outlined text-sm">add</span> 新增菜单
        </button>
      </div>
      <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
        <table class="w-full app-table">
          <thead>
            <tr class="bg-surface-container-high text-xs text-on-surface-variant uppercase tracking-wider">
              <th class="text-left px-4 py-3 font-semibold">ID</th>
              <th class="text-left px-4 py-3 font-semibold">名称</th>
              <th class="text-left px-4 py-3 font-semibold">图标</th>
              <th class="text-left px-4 py-3 font-semibold">路径</th>
              <th class="text-left px-4 py-3 font-semibold">父ID</th>
              <th class="text-left px-4 py-3 font-semibold">排序</th>
              <th class="text-left px-4 py-3 font-semibold">角色</th>
              <th class="text-left px-4 py-3 font-semibold">状态</th>
              <th class="text-left px-4 py-3 font-semibold">操作</th>
            </tr>
          </thead>
          <tbody id="menu-tbody" class="divide-y divide-outline-variant/30">
            <tr><td colspan="9" class="text-center text-outline py-lg">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab4: 权限树 -->
    <div id="tab-tree" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-md">
        <span class="text-xs text-on-surface-variant" id="tree-role-label">当前角色: --</span>
        <button class="flex items-center gap-1 px-3 py-1.5 bg-surface-container border border-outline-variant text-sm rounded-xl hover:bg-surface-container-high transition-all" onclick="loadPermTree()">
          <span class="material-symbols-outlined text-sm">refresh</span> 刷新
        </button>
      </div>
      <div class="bg-surface-container border border-outline-variant rounded-xl p-lg" id="perm-tree-content">
        <div class="text-center text-outline py-lg">加载中...</div>
      </div>
    </div>
  </div>
</main>

<!-- Role Modal -->
<div id="role-modal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center" onclick="if(event.target===this)closeRoleModal()">
  <div class="bg-surface-container border border-outline-variant rounded-xl p-lg w-full max-w-md mx-4 shadow-2xl" onclick="event.stopPropagation()">
    <h3 class="text-lg font-bold text-on-surface mb-md" id="role-modal-title">新增角色</h3>
    <input id="role-name" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="角色名称"/>
    <input id="role-code" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="角色代码"/>
    <input id="role-desc" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="描述"/>
    <div class="mb-4">
      <label class="text-xs text-on-surface-variant block mb-1">状态</label>
      <select id="role-active" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-3 py-2.5 text-sm outline-none focus:border-primary">
        <option value="true">启用</option>
        <option value="false">停用</option>
      </select>
    </div>
    <div class="flex justify-end gap-2">
      <button class="px-4 py-2 border border-outline-variant text-sm rounded-xl hover:bg-surface-container-high transition-all" onclick="closeRoleModal()">取消</button>
      <button class="px-4 py-2 bg-primary text-on-primary text-sm rounded-xl hover:brightness-110 transition-all" onclick="saveRole()">保存</button>
    </div>
  </div>
</div>

<!-- Menu Modal -->
<div id="menu-modal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center" onclick="if(event.target===this)closeMenuModal()">
  <div class="bg-surface-container border border-outline-variant rounded-xl p-lg w-full max-w-md mx-4 shadow-2xl" onclick="event.stopPropagation()">
    <h3 class="text-lg font-bold text-on-surface mb-md" id="menu-modal-title">新增菜单</h3>
    <input id="menu-name" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="菜单名称"/>
    <input id="menu-icon" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="图标名 (如 dashboard)"/>
    <input id="menu-path" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-3 outline-none focus:border-primary" placeholder="路径 (如 /dashboard)"/>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <input id="menu-parent" type="number" class="bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm outline-none focus:border-primary" placeholder="父ID (0)"/>
      <input id="menu-sort" type="number" class="bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm outline-none focus:border-primary" placeholder="排序 (0)"/>
    </div>
    <input id="menu-roles" class="w-full bg-surface-container-high border border-outline-variant rounded-xl px-4 py-2.5 text-sm mb-4 outline-none focus:border-primary" placeholder="角色代码 (逗号分隔, 空=全部可见)"/>
    <div class="flex justify-end gap-2">
      <button class="px-4 py-2 border border-outline-variant text-sm rounded-xl hover:bg-surface-container-high transition-all" onclick="closeMenuModal()">取消</button>
      <button class="px-4 py-2 bg-primary text-on-primary text-sm rounded-xl hover:brightness-110 transition-all" onclick="saveMenu()">保存</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('redirecting');

let currentTab = 'users';
let editingRoleId = null;
let editingMenuId = null;
let searchTimer = null;

function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('text-primary', btn.dataset.tab === tab);
    btn.classList.toggle('border-primary', btn.dataset.tab === tab);
    btn.classList.toggle('border-transparent', btn.dataset.tab !== tab);
    btn.classList.toggle('text-on-surface-variant', btn.dataset.tab !== tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  const panel = document.getElementById('tab-' + tab);
  if (panel) panel.classList.remove('hidden');
  // Load data on first switch
  if (tab === 'users') loadUsers();
  else if (tab === 'roles') loadRoles();
  else if (tab === 'menus') loadMenus();
  else if (tab === 'tree') loadPermTree();
}

function debounceSearch(tab, val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (tab === 'users') loadUsers(val);
  }, 300);
}

// ===== Tab1: 用户管理 =====
async function loadUsers(search) {
  try {
    const params = search ? '?search=' + encodeURIComponent(search) : '';
    const users = await apiGet('/api/permissions/users' + params);
    const tbody = document.getElementById('user-tbody');
    document.getElementById('user-count').textContent = '共 ' + users.length + ' 人';
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-outline py-lg">暂无用户</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => {
      const roleColors = {ROOT:'bg-error/20 text-error', AUDIT:'bg-tertiary/20 text-tertiary', OPS:'bg-primary/20 text-primary', USER:'bg-secondary/20 text-secondary', GUEST:'bg-outline/20 text-outline'};
      const rc = roleColors[u.role] || 'bg-outline/20 text-outline';
      return '<tr class="hover:bg-surface-container-high transition-colors">' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + u.id + '</td>' +
        '<td class="px-4 py-3 text-sm font-medium">' + escapeHtml(u.username) + '</td>' +
        '<td class="px-4 py-3 text-sm">' + escapeHtml(u.nickname || '-') + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + escapeHtml(u.email || '-') + '</td>' +
        '<td class="px-4 py-3"><span class="text-[11px] px-2 py-0.5 rounded font-label-mono ' + rc + '">' + escapeHtml(u.role) + '</span></td>' +
        '<td class="px-4 py-3">' +
          (u.is_active
            ? '<span class="text-[11px] text-secondary font-semibold">启用</span>'
            : '<span class="text-[11px] text-error font-semibold">停用</span>') +
        '</td>' +
        '<td class="px-4 py-3"><div class="flex gap-1">' +
          '<button class="text-[11px] px-2 py-1 bg-primary/20 text-primary rounded hover:bg-primary/30 transition-all" onclick="editUser(' + u.id + ')">编辑</button>' +
          (u.role !== 'ROOT'
            ? '<button class="text-[11px] px-2 py-1 ' + (u.is_active ? 'bg-error/20 text-error' : 'bg-secondary/20 text-secondary') + ' rounded hover:brightness-110 transition-all" onclick="toggleUserActive(' + u.id + ',' + u.is_active + ')">' + (u.is_active ? '停用' : '启用') + '</button>'
            : '') +
        '</div></td></tr>';
    }).join('');
  } catch(e) { showToast('加载用户失败', 'error'); }
}

async function editUser(id) {
  const users = await apiGet('/api/permissions/users');
  const u = users.find(x => x.id === id);
  if (!u) return;
  const newNickname = prompt('昵称:', u.nickname || '');
  if (newNickname === null) return;
  const newEmail = prompt('邮箱:', u.email || '');
  if (newEmail === null) return;
  const newRole = prompt('角色 (ROOT/AUDIT/OPS/USER/GUEST):', u.role || 'USER');
  if (newRole === null) return;
  try {
    const body = {};
    if (newNickname && newNickname.trim()) body.nickname = newNickname.trim();
    if (newEmail && newEmail.trim()) body.email = newEmail.trim();
    if (newRole && newRole.trim()) body.role = newRole.trim();
    await apiPut('/api/permissions/users/' + id, body);
    showToast('更新成功', 'success');
    loadUsers();
  } catch(e) { showToast('更新失败', 'error'); }
}

async function toggleUserActive(id, current) {
  if (!confirm('确定' + (current ? '停用' : '启用') + '该用户？')) return;
  try {
    await apiPut('/api/permissions/users/' + id, {is_active: !current});
    showToast('操作成功', 'success');
    loadUsers();
  } catch(e) { showToast('操作失败', 'error'); }
}

// ===== Tab2: 角色管理 =====
async function loadRoles() {
  try {
    const roles = await apiGet('/api/permissions/roles');
    const tbody = document.getElementById('role-tbody');
    document.getElementById('role-count').textContent = '共 ' + roles.length + ' 个角色';
    if (!roles.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-outline py-lg">暂无角色</td></tr>';
      return;
    }
    tbody.innerHTML = roles.map(r => {
      const builtin = ['ROOT','AUDIT','OPS','USER','GUEST'].includes(r.code);
      return '<tr class="hover:bg-surface-container-high transition-colors">' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + r.id + '</td>' +
        '<td class="px-4 py-3 text-sm font-medium">' + escapeHtml(r.name) + '</td>' +
        '<td class="px-4 py-3"><span class="text-[11px] bg-primary/20 text-primary px-2 py-0.5 rounded font-label-mono">' + escapeHtml(r.code) + '</span></td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + escapeHtml(r.description || '-') + '</td>' +
        '<td class="px-4 py-3">' +
          (r.is_active
            ? '<span class="text-[11px] text-secondary font-semibold">启用</span>'
            : '<span class="text-[11px] text-error font-semibold">停用</span>') +
        '</td>' +
        '<td class="px-4 py-3"><div class="flex gap-1">' +
          '<button class="text-[11px] px-2 py-1 bg-primary/20 text-primary rounded hover:bg-primary/30 transition-all" onclick="editRole(' + r.id + ')">编辑</button>' +
          (!builtin
            ? '<button class="text-[11px] px-2 py-1 bg-error/20 text-error rounded hover:bg-error/30 transition-all" onclick="deleteRole(' + r.id + ')">删除</button>'
            : '') +
        '</div></td></tr>';
    }).join('');
  } catch(e) { showToast('加载角色失败', 'error'); }
}

function openRoleModal() {
  editingRoleId = null;
  document.getElementById('role-modal-title').textContent = '新增角色';
  document.getElementById('role-name').value = '';
  document.getElementById('role-code').value = '';
  document.getElementById('role-desc').value = '';
  document.getElementById('role-active').value = 'true';
  document.getElementById('role-modal').classList.remove('hidden');
}

function closeRoleModal() {
  document.getElementById('role-modal').classList.add('hidden');
}

async function editRole(id) {
  try {
    const roles = await apiGet('/api/permissions/roles');
    const r = roles.find(x => x.id === id);
    if (!r) return;
    editingRoleId = id;
    document.getElementById('role-modal-title').textContent = '编辑角色';
    document.getElementById('role-name').value = r.name;
    document.getElementById('role-code').value = r.code;
    document.getElementById('role-desc').value = r.description || '';
    document.getElementById('role-active').value = r.is_active ? 'true' : 'false';
    document.getElementById('role-modal').classList.remove('hidden');
  } catch(e) { showToast('加载失败', 'error'); }
}

async function saveRole() {
  const name = document.getElementById('role-name').value.trim();
  const code = document.getElementById('role-code').value.trim();
  const desc = document.getElementById('role-desc').value.trim();
  const is_active = document.getElementById('role-active').value === 'true';
  if (!name || !code) { showToast('名称和代码不能为空', 'error'); return; }
  try {
    if (editingRoleId) {
      await apiPut('/api/permissions/roles/' + editingRoleId, {name, code, description: desc, is_active});
      showToast('更新成功', 'success');
    } else {
      await apiPost('/api/permissions/roles', {name, code, description: desc});
      showToast('创建成功', 'success');
    }
    closeRoleModal();
    loadRoles();
  } catch(e) { showToast('操作失败', 'error'); }
}

async function deleteRole(id) {
  if (!confirm('确定删除此角色？')) return;
  try {
    await apiDelete('/api/permissions/roles/' + id);
    showToast('删除成功', 'success');
    loadRoles();
  } catch(e) { showToast('删除失败', 'error'); }
}

// ===== Tab3: 菜单管理 =====
async function loadMenus() {
  try {
    const menus = await apiGet('/api/permissions/menus/all');
    const tbody = document.getElementById('menu-tbody');
    document.getElementById('menu-count').textContent = '共 ' + menus.length + ' 个菜单';
    if (!menus.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-outline py-lg">暂无菜单</td></tr>';
      return;
    }
    tbody.innerHTML = menus.map(m => {
      return '<tr class="hover:bg-surface-container-high transition-colors">' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + m.id + '</td>' +
        '<td class="px-4 py-3 text-sm font-medium">' + escapeHtml(m.name) + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + escapeHtml(m.icon || '-') + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant font-mono">' + escapeHtml(m.path) + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + m.parent_id + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + m.sort_order + '</td>' +
        '<td class="px-4 py-3 text-sm text-on-surface-variant">' + escapeHtml(m.role_codes || '全部') + '</td>' +
        '<td class="px-4 py-3">' +
          (m.is_active
            ? '<span class="text-[11px] text-secondary font-semibold">启用</span>'
            : '<span class="text-[11px] text-error font-semibold">停用</span>') +
        '</td>' +
        '<td class="px-4 py-3"><div class="flex gap-1">' +
          '<button class="text-[11px] px-2 py-1 bg-primary/20 text-primary rounded hover:bg-primary/30 transition-all" onclick="editMenu(' + m.id + ')">编辑</button>' +
          '<button class="text-[11px] px-2 py-1 bg-error/20 text-error rounded hover:bg-error/30 transition-all" onclick="deleteMenu(' + m.id + ')">删除</button>' +
        '</div></td></tr>';
    }).join('');
  } catch(e) { showToast('加载菜单失败', 'error'); }
}

function openMenuModal() {
  editingMenuId = null;
  document.getElementById('menu-modal-title').textContent = '新增菜单';
  document.getElementById('menu-name').value = '';
  document.getElementById('menu-icon').value = '';
  document.getElementById('menu-path').value = '';
  document.getElementById('menu-parent').value = '0';
  document.getElementById('menu-sort').value = '0';
  document.getElementById('menu-roles').value = '';
  document.getElementById('menu-modal').classList.remove('hidden');
}

function closeMenuModal() {
  document.getElementById('menu-modal').classList.add('hidden');
}

async function editMenu(id) {
  try {
    const menus = await apiGet('/api/permissions/menus/all');
    const m = menus.find(x => x.id === id);
    if (!m) return;
    editingMenuId = id;
    document.getElementById('menu-modal-title').textContent = '编辑菜单';
    document.getElementById('menu-name').value = m.name;
    document.getElementById('menu-icon').value = m.icon || '';
    document.getElementById('menu-path').value = m.path;
    document.getElementById('menu-parent').value = m.parent_id;
    document.getElementById('menu-sort').value = m.sort_order;
    document.getElementById('menu-roles').value = m.role_codes || '';
    document.getElementById('menu-modal').classList.remove('hidden');
  } catch(e) { showToast('加载失败', 'error'); }
}

async function saveMenu() {
  const name = document.getElementById('menu-name').value.trim();
  const icon = document.getElementById('menu-icon').value.trim();
  const path = document.getElementById('menu-path').value.trim();
  const parent_id = parseInt(document.getElementById('menu-parent').value) || 0;
  const sort_order = parseInt(document.getElementById('menu-sort').value) || 0;
  const role_codes = document.getElementById('menu-roles').value.trim();
  if (!name || !path) { showToast('名称和路径不能为空', 'error'); return; }
  try {
    if (editingMenuId) {
      await apiPut('/api/permissions/menus/' + editingMenuId, {name, icon, path, parent_id, sort_order, role_codes});
      showToast('更新成功', 'success');
    } else {
      await apiPost('/api/permissions/menus', {name, icon, path, parent_id, sort_order, role_codes});
      showToast('创建成功', 'success');
    }
    closeMenuModal();
    loadMenus();
  } catch(e) { showToast('操作失败', 'error'); }
}

async function deleteMenu(id) {
  if (!confirm('确定删除此菜单？')) return;
  try {
    await apiDelete('/api/permissions/menus/' + id);
    showToast('删除成功', 'success');
    loadMenus();
  } catch(e) { showToast('删除失败', 'error'); }
}

// ===== Tab4: 权限树 =====
async function loadPermTree() {
  try {
    const tree = await apiGet('/api/permissions/tree');
    const el = document.getElementById('perm-tree-content');
    const label = document.getElementById('tree-role-label');
    if (label) label.textContent = '当前角色: ' + (tree.role_name || tree.role || '--');
    if (!el) return;
    if (!tree.modules || !tree.modules.length) {
      el.innerHTML = '<div class="text-center text-outline py-lg">暂无权限数据</div>';
      return;
    }
    el.innerHTML = tree.modules.map(m => {
      const perms = (m.permissions || []).map(p =>
        '<span class="text-[11px] px-2 py-0.5 bg-primary-container/20 text-primary-container rounded">' + escapeHtml(p) + '</span>'
      ).join('');
      return '<div class="flex items-center justify-between bg-surface-container-high/50 rounded-lg px-4 py-3 mb-2">' +
        '<div class="flex items-center gap-3">' +
          '<span class="material-symbols-outlined text-primary text-lg">' + (m.icon || 'folder') + '</span>' +
          '<span class="text-sm font-medium">' + escapeHtml(m.name) + '</span>' +
          '<span class="text-[10px] text-on-surface-variant font-mono">' + escapeHtml(m.path || '') + '</span>' +
        '</div>' +
        '<div class="flex gap-1">' + perms + '</div>' +
      '</div>';
    }).join('');
    // Stats
    if (tree.total_nodes !== undefined) {
      document.getElementById('tree-role-label').textContent += ' | 节点数: ' + tree.total_nodes;
    }
  } catch(e) {
    const el = document.getElementById('perm-tree-content');
    if (el) el.innerHTML = '<div class="text-center text-outline py-lg">加载权限树失败</div>';
  }
}

// Initial load
loadUsers();
</script>
