<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>即时通信 — 数据瞭望系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "background": "#0b1326", "surface": "#0b1326", "surface-dim": "#0b1326",
        "surface-bright": "#31394d", "surface-container-lowest": "#060e20",
        "surface-container-low": "#131b2e", "surface-container": "#171f33",
        "surface-container-high": "#222a3d", "surface-container-highest": "#2d3449",
        "surface-variant": "#2d3449", "primary": "#adc6ff",
        "on-primary": "#002e6a", "primary-container": "#4d8eff",
        "on-primary-container": "#00285d", "primary-fixed": "#d8e2ff",
        "primary-fixed-dim": "#adc6ff", "secondary": "#4edea3",
        "on-secondary": "#003824", "secondary-container": "#00a572",
        "on-secondary-container": "#00311f", "tertiary": "#ffb786",
        "error": "#ffb4ab", "on-error": "#690005",
        "error-container": "#93000a", "on-error-container": "#ffdad6",
        "outline": "#8c909f", "outline-variant": "#424754",
        "on-surface": "#dae2fd", "on-surface-variant": "#c2c6d6",
        "on-background": "#dae2fd", "inverse-surface": "#dae2fd",
        "inverse-on-surface": "#283044", "inverse-primary": "#005ac2",
      },
      borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
      fontFamily: {
        "display-lg": ["Inter"], "body-md": ["Inter"], "headline-lg": ["Inter"],
        "body-sm": ["Inter"], "headline-md": ["Inter"], "label-md": ["JetBrains Mono"],
        "body-lg": ["Inter"], "label-sm": ["JetBrains Mono"]
      },
    }
  }
};
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .fill-icon { font-variation-settings: 'FILL' 1; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #424754; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #8c909f; }
  .msg-failed { color: #ffb4ab; }
  .msg-sending { color: #8c909f; }
  .msg-sent { color: #8c909f; }
  .msg-delivered { color: #4edea3; }
  .msg-read { color: #4edea3; }
  .msg-recalled { opacity: 0.5; font-style: italic; }
  @keyframes pulse-dot { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .typing-dot { animation: pulse-dot 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen">
<!-- Sidebar placeholder (app.js will replace with unified sidebar) -->
<aside></aside>

<!-- Main IM Layout -->
<main class=" flex h-full">
  <!-- Contact Panel (Middle Column) -->
  <section class="w-[320px] bg-surface-container-low border-r border-outline-variant flex flex-col flex-shrink-0">
    <!-- Panel Header -->
    <div class="px-4 pt-4 pb-2 border-b border-outline-variant">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-headline-md text-headline-md font-bold text-on-surface">即时通信</h2>
        <div class="flex gap-1">
          <button id="btn-add-friend" title="添加好友" class="p-1.5 hover:bg-surface-container-high rounded-lg text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-lg">person_add</span>
          </button>
          <button id="btn-create-group" title="创建群聊" class="p-1.5 hover:bg-surface-container-high rounded-lg text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-lg">group_add</span>
          </button>
        </div>
      </div>
      <!-- Tabs -->
      <div class="flex gap-1 bg-surface-container-high rounded-lg p-1">
        <button data-tab="conversations" class="tab-btn flex-1 px-3 py-1.5 rounded-md text-sm font-medium transition-colors bg-primary text-on-primary">会话</button>
        <button data-tab="friends" class="tab-btn flex-1 px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-on-surface-variant hover:text-on-surface">好友</button>
        <button data-tab="groups" class="tab-btn flex-1 px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-on-surface-variant hover:text-on-surface">群组</button>
        <button data-tab="requests" class="tab-btn flex-1 px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-on-surface-variant hover:text-on-surface relative">
          申请
          <span id="request-badge" class="hidden absolute -top-1 -right-1 bg-error text-on-error text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
      </div>
    </div>

    <!-- Search (only for friends tab) -->
    <div id="search-bar" class="hidden px-4 py-2 border-b border-outline-variant">
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">search</span>
        <input id="search-input" class="w-full bg-surface-container-high border border-outline-variant text-sm py-2 pl-10 pr-3 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none" placeholder="搜索用户..." type="text"/>
      </div>
      <div id="search-results" class="hidden mt-2 space-y-1 max-h-[300px] overflow-y-auto"></div>
    </div>

    <!-- List Area -->
    <div id="contact-list" class="flex-1 overflow-y-auto">
      <!-- Dynamic content -->
    </div>

    <!-- Connection Status -->
    <div class="px-4 py-2 border-t border-outline-variant flex items-center gap-2 text-xs">
      <span id="ws-status-dot" class="w-2 h-2 rounded-full bg-outline"></span>
      <span id="ws-status-text" class="text-outline">连接中...</span>
    </div>
  </section>

  <!-- Chat Area (Right Column) -->
  <section id="chat-panel" class="flex-1 flex flex-col min-w-0">
    <!-- Empty State -->
    <div id="chat-empty" class="flex-1 flex flex-col items-center justify-center text-outline">
      <span class="material-symbols-outlined text-6xl mb-4">forum</span>
      <p class="text-lg">选择一个会话开始聊天</p>
      <p class="text-sm mt-2">或从左侧添加好友、创建群聊</p>
    </div>

    <!-- Active Chat (hidden until a conversation is selected) -->
    <div id="chat-active" class="hidden flex-1 flex flex-col min-w-0">
      <!-- Chat Header -->
      <header class="h-14 flex items-center justify-between px-5 bg-surface-container border-b border-outline-variant flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <div id="chat-avatar" class="w-9 h-9 rounded-full bg-surface-container-highest flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-on-surface-variant">person</span>
          </div>
          <div class="min-w-0">
            <h3 id="chat-title" class="text-sm font-bold text-on-surface truncate">--</h3>
            <p id="chat-subtitle" class="text-[11px] text-outline truncate"></p>
          </div>
        </div>
        <div class="flex items-center gap-1 text-on-surface-variant">
          <button id="btn-group-members" class="hidden p-2 hover:bg-surface-container-high rounded-lg transition-colors" title="群成员">
            <span class="material-symbols-outlined text-lg">groups</span>
          </button>
          <button id="btn-leave-group" class="hidden p-2 hover:bg-surface-container-high rounded-lg transition-colors text-error" title="退出群聊">
            <span class="material-symbols-outlined text-lg">logout</span>
          </button>
          <button id="btn-delete-friend" class="hidden p-2 hover:bg-surface-container-high rounded-lg transition-colors text-error" title="删除好友">
            <span class="material-symbols-outlined text-lg">person_remove</span>
          </button>
        </div>
      </header>

      <!-- Message Area -->
      <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-3 bg-surface-container-lowest">
        <!-- Messages rendered here -->
      </div>

      <!-- Typing Indicator -->
      <div id="typing-indicator" class="hidden px-5 py-1 text-xs text-outline flex items-center gap-2">
        <span id="typing-name"></span>
        <span class="flex gap-1">
          <span class="typing-dot w-1 h-1 bg-outline rounded-full"></span>
          <span class="typing-dot w-1 h-1 bg-outline rounded-full"></span>
          <span class="typing-dot w-1 h-1 bg-outline rounded-full"></span>
        </span>
      </div>

      <!-- Input Area -->
      <div class="px-4 py-3 bg-surface-container border-t border-outline-variant flex-shrink-0">
        <div class="bg-surface-container-high border border-outline-variant rounded-xl focus-within:border-primary transition-all">
          <textarea id="msg-input" class="w-full bg-transparent border-none focus:ring-0 text-sm resize-none px-3 py-2 outline-none placeholder:text-outline" placeholder="输入消息，Enter发送，Shift+Enter换行" rows="1"></textarea>
          <div class="flex items-center justify-between px-3 pb-2">
            <div class="flex gap-1">
              <button id="btn-emoji" class="p-1.5 hover:bg-surface-variant rounded-lg text-outline hover:text-primary transition-colors" title="表情">
                <span class="material-symbols-outlined text-lg">mood</span>
              </button>
              <button id="btn-upload-image" class="p-1.5 hover:bg-surface-variant rounded-lg text-outline hover:text-primary transition-colors" title="发送图片">
                <span class="material-symbols-outlined text-lg">image</span>
              </button>
              <button id="btn-upload-file" class="p-1.5 hover:bg-surface-variant rounded-lg text-outline hover:text-primary transition-colors" title="发送文件">
                <span class="material-symbols-outlined text-lg">attach_file</span>
              </button>
            </div>
            <button id="btn-send" class="bg-primary text-on-primary px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 hover:brightness-110 active:scale-95 transition-all">
              <span>发送</span>
              <span class="material-symbols-outlined text-sm">send</span>
            </button>
          </div>
        </div>
        <input id="file-input" type="file" class="hidden"/>
      </div>
    </div>
  </section>
</main>

<!-- Modal: Add Friend -->
<div id="modal-add-friend" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
  <div class="bg-surface-container border border-outline-variant rounded-2xl p-6 w-96 shadow-2xl">
    <h3 class="text-lg font-bold mb-4">添加好友</h3>
    <div class="relative mb-3">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
      <input id="modal-search-input" class="w-full bg-surface-container-high border border-outline-variant text-sm py-2 pl-10 pr-3 rounded-lg outline-none focus:border-primary" placeholder="输入用户名搜索..." type="text"/>
    </div>
    <div id="modal-search-results" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
    <div class="flex justify-end gap-2">
      <button class="modal-close px-4 py-2 text-sm text-on-surface-variant hover:text-on-surface transition-colors">取消</button>
    </div>
  </div>
</div>

<!-- Modal: Create Group -->
<div id="modal-create-group" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
  <div class="bg-surface-container border border-outline-variant rounded-2xl p-6 w-96 shadow-2xl">
    <h3 class="text-lg font-bold mb-4">创建群聊</h3>
    <input id="group-name-input" class="w-full bg-surface-container-high border border-outline-variant text-sm py-2 px-3 rounded-lg outline-none focus:border-primary mb-3" placeholder="群名称" type="text"/>
    <p class="text-xs text-outline mb-2">选择成员：</p>
    <div id="group-member-list" class="space-y-1 max-h-48 overflow-y-auto mb-4"></div>
    <div class="flex justify-end gap-2">
      <button class="modal-close px-4 py-2 text-sm text-on-surface-variant hover:text-on-surface transition-colors">取消</button>
      <button id="btn-confirm-create-group" class="bg-primary text-on-primary px-4 py-2 text-sm font-bold rounded-lg hover:brightness-110 transition-all">创建</button>
    </div>
  </div>
</div>

<!-- Modal: Group Members -->
<div id="modal-group-members" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50">
  <div class="bg-surface-container border border-outline-variant rounded-2xl p-6 w-80 shadow-2xl">
    <h3 class="text-lg font-bold mb-4">群成员</h3>
    <div id="group-member-display" class="space-y-2 max-h-72 overflow-y-auto mb-4"></div>
    <div class="flex justify-end">
      <button class="modal-close px-4 py-2 text-sm text-on-surface-variant hover:text-on-surface transition-colors">关闭</button>
    </div>
  </div>
</div>

<!-- Emoji Picker (simple) -->
<div id="emoji-picker" class="hidden absolute bottom-full right-0 mb-2 bg-surface-container border border-outline-variant rounded-xl p-3 shadow-2xl z-50 w-64">
  <div class="grid grid-cols-8 gap-1 text-lg">
  </div>
</div>

<!-- @Mention Picker for group chat -->
<div id="mention-picker" class="hidden absolute bottom-full left-4 mb-2 bg-surface-container border border-outline-variant rounded-xl shadow-2xl z-50 w-72 max-h-64 overflow-y-auto">
  <div class="px-3 py-2 border-b border-outline-variant text-xs text-on-surface-variant font-medium">选择数字员工 @</div>
  <div id="mention-list" class="py-1"></div>
</div>

<script src="/static/js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('redirecting');

// ====== State ======
const State = {
  activeTab: 'conversations',
  activeChat: null,  // { type: 'single'|'group', peerId, groupId, name, avatar }
  currentUser: null,
  conversations: [],
  friends: [],
  groups: [],
  requests: [],
  messages: [],      // current chat messages
  oldestMsgId: null, // for pagination
  typingTimer: null,
  pendingMsgs: {},   // msg_id → { element, content, retries }
  deAgentList: [],   // published digital employees for @mention
  mentionActive: false,
  mentionQuery: '',
  mentionStart: -1,  // cursor position when @ was typed
};

const EMOJIS = ['😀','😂','🤣','😊','😍🥰','😎','🤔','😴','😭','😡','🥳','🤯','👍','👎','👏','🙏','💪','🎉','🔥','💯','❤️','💔','✅','❌','⚡','🌟','🌈','🍀','🎯','💡','📊','📈'];

// ====== Init ======
async function init() {
  try {
    State.currentUser = await apiGet('/api/auth/profile');
  } catch { return; }

  // Connect WebSocket
  if (!IM.connected) IM.connect();

  // WebSocket event handlers
  IM.on('connected', () => updateWsStatus(true));
  IM.on('disconnected', () => updateWsStatus(false));
  IM.on('reconnect_failed', () => updateWsStatus(false));

  IM.on('chat', (body) => onChatReceived(body));
  IM.on('ack', (body) => onAckReceived(body));
  IM.on('recall', (body) => onRecallReceived(body));
  IM.on('typing', (body) => onTypingReceived(body));
  IM.on('read_receipt', (body) => onReadReceiptReceived(body));
  IM.on('friend_request', (body) => onFriendRequestReceived(body));
  IM.on('friend_accepted', (body) => onFriendAcceptedReceived(body));
  IM.on('group_invite', (body) => onGroupInviteReceived(body));

  // Load initial data
  await loadAllLists();

  // Auto-open conversation from URL params (/im?peer=5 or /im?group=3)
  const urlParams = new URLSearchParams(location.search);
  const peerParam = urlParams.get('peer');
  const groupParam = urlParams.get('group');
  if (peerParam) {
    const peerId = parseInt(peerParam);
    const friend = State.friends.find(f => f.id === peerId);
    openChat('single', peerId, null, friend ? (friend.nickname || friend.username) : '用户' + peerId, friend?.avatar || '');
  } else if (groupParam) {
    const groupId = parseInt(groupParam);
    const grp = State.groups.find(g => g.id === groupId);
    openChat('group', null, groupId, grp?.name || '群聊', '');
  }

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Search input
  document.getElementById('search-input').addEventListener('input', (e) => {
    if (e.target.value.trim()) searchUsers(e.target.value.trim());
    else document.getElementById('search-results').classList.add('hidden');
  });

  // Modal buttons
  document.getElementById('btn-add-friend').addEventListener('click', () => openModal('modal-add-friend'));
  document.getElementById('btn-create-group').addEventListener('click', () => openCreateGroupModal());
  document.getElementById('modal-search-input').addEventListener('input', (e) => {
    if (e.target.value.trim()) searchUsersInModal(e.target.value.trim());
    else document.getElementById('modal-search-results').innerHTML = '';
  });

  // Group members
  document.getElementById('btn-group-members').addEventListener('click', () => loadGroupMembers());
  document.getElementById('btn-leave-group').addEventListener('click', () => leaveGroup());
  document.getElementById('btn-delete-friend').addEventListener('click', () => deleteFriend());

  // Close modal handlers
  document.querySelectorAll('.modal-close').forEach(btn => {
    btn.addEventListener('click', () => closeAllModals());
  });
  document.querySelectorAll('[id^="modal-"]').forEach(m => {
    m.addEventListener('click', (e) => { if (e.target === m) closeAllModals(); });
  });

  // Chat input
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('btn-send');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    // @mention detection (only in group chat)
    if (State.activeChat && State.activeChat.type === 'group') {
      handleMentionInput(input);
    }
  });
  input.addEventListener('keydown', (e) => {
    // Handle mention picker navigation
    if (State.mentionActive) {
      if (e.key === 'Escape') { hideMentionPicker(); return; }
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        navigateMention(e.key === 'ArrowDown' ? 1 : -1);
        return;
      }
      if (e.key === 'Enter' && State.mentionActive) {
        e.preventDefault();
        selectMention();
        return;
      }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  // Close mention picker on blur
  input.addEventListener('blur', () => {
    setTimeout(() => hideMentionPicker(), 200);
  });
  sendBtn.addEventListener('click', () => sendMessage());

  // File upload
  document.getElementById('btn-upload-image').addEventListener('click', () => {
    const fi = document.getElementById('file-input');
    fi.accept = 'image/*';
    fi.onchange = (e) => { if (e.target.files[0]) uploadAndSendFile(e.target.files[0], 'image'); fi.value = ''; };
    fi.click();
  });
  document.getElementById('btn-upload-file').addEventListener('click', () => {
    const fi = document.getElementById('file-input');
    fi.accept = '*/*';
    fi.onchange = (e) => { if (e.target.files[0]) uploadAndSendFile(e.target.files[0], 'file'); fi.value = ''; };
    fi.click();
  });

  // Emoji
  const emojiPicker = document.getElementById('emoji-picker');
  const emojiGrid = emojiPicker.querySelector('.grid');
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'hover:bg-surface-variant rounded p-1 transition-colors';
    btn.textContent = emoji;
    btn.addEventListener('click', () => {
      input.value += emoji;
      input.focus();
      emojiPicker.classList.add('hidden');
    });
    emojiGrid.appendChild(btn);
  });
  document.getElementById('btn-emoji').addEventListener('click', (e) => {
    e.stopPropagation();
    emojiPicker.classList.toggle('hidden');
    const rect = e.currentTarget.getBoundingClientRect();
    emojiPicker.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
    emojiPicker.style.right = (window.innerWidth - rect.right) + 'px';
  });
  document.addEventListener('click', (e) => {
    if (!emojiPicker.contains(e.target) && e.target.id !== 'btn-emoji') emojiPicker.classList.add('hidden');
  });

  // Scroll to load more history
  const msgContainer = document.getElementById('chat-messages');
  msgContainer.addEventListener('scroll', () => {
    if (msgContainer.scrollTop < 50 && State.activeChat && State.oldestMsgId) {
      loadMoreHistory();
    }
  });
}

// ====== WebSocket Status ======
function updateWsStatus(connected) {
  const dot = document.getElementById('ws-status-dot');
  const text = document.getElementById('ws-status-text');
  if (connected) {
    dot.className = 'w-2 h-2 rounded-full bg-secondary';
    text.textContent = '已连接';
    text.className = 'text-secondary';
  } else {
    dot.className = 'w-2 h-2 rounded-full bg-error';
    text.textContent = '已断开';
    text.className = 'text-error';
  }
}

// ====== Tab Switching ======
function switchTab(tab) {
  State.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.className = `tab-btn flex-1 px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${active ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:text-on-surface'}`;
  });
  document.getElementById('search-bar').classList.toggle('hidden', tab !== 'friends');
  renderContactList();
}

// ====== Load Lists ======
async function loadAllLists() {
  try {
    const [convs, frs, grps, reqs] = await Promise.all([
      apiGet('/api/messages/conversations'),
      apiGet('/api/friends'),
      apiGet('/api/groups'),
      apiGet('/api/friends/requests'),
    ]);
    State.conversations = convs || [];
    State.friends = frs || [];
    State.groups = grps || [];
    State.requests = reqs || [];
    updateRequestBadge();
    renderContactList();
  } catch (e) { console.error('loadAllLists:', e); }
}

function updateRequestBadge() {
  const pending = State.requests.filter(r => r.status === 'pending');
  const badge = document.getElementById('request-badge');
  if (pending.length > 0) {
    badge.textContent = pending.length;
    badge.classList.remove('hidden');
    badge.classList.add('flex');
  } else {
    badge.classList.add('hidden');
    badge.classList.remove('flex');
  }
}

// ====== Render Contact List ======
function renderContactList() {
  const container = document.getElementById('contact-list');
  const tab = State.activeTab;

  if (tab === 'conversations') {
    if (!State.conversations.length) {
      container.innerHTML = '<div class="text-center text-outline text-sm py-8">暂无会话</div>';
      return;
    }

// ====== Open Chat ======
async function openChat(type, peerId, groupId, name, avatar) {
  State.activeChat = { type, peerId, groupId, name, avatar };

  document.getElementById('chat-empty').classList.add('hidden');
  document.getElementById('chat-active').classList.remove('hidden');
  document.getElementById('chat-title').textContent = name;

  // Set avatar
  const avatarEl = document.getElementById('chat-avatar');
  if (avatar) {
    avatarEl.innerHTML = `<img src="${escapeHtml(avatar)}" class="w-full h-full object-cover rounded-full"/>`;
  } else {
    avatarEl.innerHTML = type === 'group'
      ? '<span class="material-symbols-outlined text-on-surface-variant">groups</span>'
      : '<span class="material-symbols-outlined text-on-surface-variant">person</span>';
  }

  // Subtitle
  if (type === 'group') {
    document.getElementById('chat-subtitle').textContent = '群聊';
    document.getElementById('btn-group-members').classList.remove('hidden');
    document.getElementById('btn-leave-group').classList.remove('hidden');
    document.getElementById('btn-delete-friend').classList.add('hidden');
  } else {
    const friend = State.friends.find(f => f.id === peerId);
    document.getElementById('chat-subtitle').textContent = friend ? (friend.is_online ? '在线' : '离线') : '';
    document.getElementById('btn-group-members').classList.add('hidden');
    document.getElementById('btn-leave-group').classList.add('hidden');
    document.getElementById('btn-delete-friend').classList.remove('hidden');
  }

  // Load message history
  State.messages = [];
  State.oldestMsgId = null;
  await loadHistory(true);

  // Mark conversations as read visually
  renderContactList();
}

// ====== Load History ======
async function loadHistory(scrollToBottom) {
  if (!State.activeChat) return;
  const { type, peerId, groupId } = State.activeChat;
  let url = '/api/messages/history?limit=50';
  if (type === 'single') url += '&peer_id=' + peerId;
  else url += '&group_id=' + groupId;

  try {
    const msgs = await apiGet(url);
    if (msgs && msgs.length) {
      State.messages = msgs;
      State.oldestMsgId = msgs[0]?.id;
      renderMessages(scrollToBottom);
    } else {
      document.getElementById('chat-messages').innerHTML = '<div class="text-center text-outline text-sm py-8">暂无消息，发送第一条消息吧</div>';
    }
  } catch (e) { console.error('loadHistory:', e); }
}

async function loadMoreHistory() {
  if (!State.activeChat || !State.oldestMsgId) return;
  const { type, peerId, groupId } = State.activeChat;
  let url = '/api/messages/history?limit=30&before=' + State.oldestMsgId;
  if (type === 'single') url += '&peer_id=' + peerId;
  else url += '&group_id=' + groupId;

  try {
    const older = await apiGet(url);
    if (older && older.length) {
      const container = document.getElementById('chat-messages');
      const prevScrollHeight = container.scrollHeight;
      State.messages = [...older, ...State.messages];
      State.oldestMsgId = older[0]?.id;
      renderMessages(false);
      container.scrollTop = container.scrollHeight - prevScrollHeight;
    }
  } catch (e) { console.error('loadMoreHistory:', e); }
}

// ====== Render Messages ======
function renderMessages(scrollToBottom) {
  const container = document.getElementById('chat-messages');
  if (!State.messages.length) {
    container.innerHTML = '<div class="text-center text-outline text-sm py-8">暂无消息，发送第一条消息吧</div>';
    return;
  }

  const myId = State.currentUser?.id;
  let html = '';
  let lastDate = '';

  for (const msg of State.messages) {
    // Date separator
    const dateStr = msg.created_at ? new Date(msg.created_at).toLocaleDateString('zh-CN') : '';
    if (dateStr && dateStr !== lastDate) {
      html += `<div class="flex justify-center my-2"><span class="text-[10px] text-outline bg-surface-container px-2 py-0.5 rounded">${dateStr}</span></div>`;
      lastDate = dateStr;
    }

    const isMe = msg.sender_id === myId;
    const isRecalled = msg.status === 'recalled';
    const isFailed = msg.status === 'failed';
    const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';

    // Sender name for group chat
    let senderName = '';
    if (State.activeChat.type === 'group' && !isMe) {
      senderName = msg.sender_name || `用户${msg.sender_id}`;
    }

    if (isRecalled) {
      html += `<div class="flex justify-center my-1"><span class="text-[10px] text-outline bg-surface-container px-2 py-0.5 rounded">消息已撤回</span></div>`;
      continue;
    }

    const bubbleClass = isMe
      ? 'bg-primary text-on-primary rounded-tr-none'
      : 'bg-surface-container-high text-on-surface rounded-tl-none';

    let contentHtml = '';
    if (msg.msg_type === 'image' && msg.file_url) {
      contentHtml = `<img src="${escapeHtml(msg.file_url)}" class="max-w-48 max-h-48 rounded-lg cursor-pointer" onclick="window.open('${escapeHtml(msg.file_url)}')"/>`;
    } else if (msg.msg_type === 'file' && msg.file_url) {
      contentHtml = `
        <a href="${escapeHtml(msg.file_url)}" target="_blank" class="flex items-center gap-2 p-2 bg-surface-container-lowest rounded-lg hover:bg-surface-variant transition-colors">
          <span class="material-symbols-outlined text-primary">description</span>
          <div class="min-w-0">
            <p class="text-xs font-medium truncate">${escapeHtml(msg.file_name || '文件')}</p>
            <p class="text-[10px] text-outline">${msg.file_size ? Math.round(msg.file_size/1024) + 'KB' : ''}</p>
          </div>
          <span class="material-symbols-outlined text-outline text-sm">download</span>
        </a>`;
    } else if (msg.content === '<typing>') {
      contentHtml = `<span class="flex gap-1"><span class="typing-dot w-1.5 h-1.5 bg-outline rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-outline rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-outline rounded-full"></span></span>`;
    } else {
      contentHtml = `<p class="text-sm leading-relaxed whitespace-pre-wrap break-words">${escapeHtml(msg.content || '')}</p>`;
    }

    // Status indicator for my messages
    let statusIcon = '';
    if (isMe && !isRecalled) {
      if (isFailed) {
        statusIcon = '<span class="msg-failed text-[10px] flex items-center gap-0.5"><span class="material-symbols-outlined text-xs">error</span>发送失败</span>';
      } else if (msg.status === 'sending') {
        statusIcon = '<span class="msg-sending text-[10px]">发送中</span>';
      } else if (msg.status === 'delivered') {
        statusIcon = '<span class="msg-delivered text-[10px]">已送达</span>';
      } else if (msg.is_read) {
        statusIcon = '<span class="msg-read text-[10px]">已读</span>';
      } else {
        statusIcon = '<span class="msg-sent text-[10px]">已发送</span>';
      }
    }

    // Recall button for my messages within 2 minutes
    let actionBtn = '';
    if (isMe && !isRecalled) {
      const elapsed = msg.created_at ? (Date.now() - new Date(msg.created_at).getTime()) / 1000 : 999;
      if (elapsed < 120) {
        actionBtn = `<button class="recall-btn text-[10px] text-outline hover:text-error transition-colors" data-msg-id="${msg.msg_id || ''}" data-db-id="${msg.id || ''}">撤回</button>`;
      }
    }

    const rowClass = isMe ? 'flex-row-reverse' : 'flex-row';

    html += `
      <div class="flex ${rowClass} gap-2 items-start group">
        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[75%]">
          ${senderName ? `<span class="text-[10px] text-outline mb-0.5">${escapeHtml(senderName)}</span>` : ''}
          <div class="${bubbleClass} px-3 py-2 rounded-xl shadow-sm">${contentHtml}</div>
          <div class="flex items-center gap-2 mt-0.5">
            <span class="text-[10px] text-outline">${time}</span>
            ${statusIcon}
            ${actionBtn}
          </div>
        </div>
      </div>`;
  }

  container.innerHTML = html;

  // Bind recall buttons
  container.querySelectorAll('.recall-btn').forEach(btn => {
    btn.addEventListener('click', () => recallMessage(btn.dataset.msgId, btn.dataset.dbId));
  });

  // Bind retry for failed messages
  container.querySelectorAll('[data-retry]').forEach(btn => {
    btn.addEventListener('click', () => retryMessage(btn.dataset.retry));
  });

  if (scrollToBottom) {
    container.scrollTop = container.scrollHeight;
  }
}

// ====== Send Message ======
function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !State.activeChat || !IM.connected) {
    if (!IM.connected) showToast('连接已断开，请等待重连', 'error');
    return;
  }

  const { type, peerId, groupId } = State.activeChat;
  const body = {
    content: content,
    content_type: 'text',
    chat_type: type === 'group' ? 'group' : 'single',
  };
  if (type === 'single') body.receiver_id = peerId;
  if (type === 'group') body.group_id = groupId;

  const msgId = IM.sendChat(body);

  // Optimistic UI: add message to list immediately
  const optimisticMsg = {
    id: null,
    msg_id: msgId,
    sender_id: State.currentUser.id,
    sender_name: State.currentUser.nickname,
    content: content,
    msg_type: 'text',
    status: 'sending',
    is_read: false,
    created_at: new Date().toISOString(),
    file_url: '',
    file_name: '',
    file_size: 0,
  };
  State.messages.push(optimisticMsg);
  renderMessages(true);

  input.value = '';
  input.style.height = 'auto';

  // @mention: check if message mentions any digital employee in group chat
  if (type === 'group' && State.deAgentList.length) {
    checkAndTriggerDE(content, groupId);
  }
}

// ====== @Mention: Trigger Digital Employee Response in Group ======
async function checkAndTriggerDE(content, groupId) {
  // Check if any digital employee is mentioned
  let mentionedAgent = null;
  for (const agent of State.deAgentList) {
    if (content.includes('@' + agent.name)) {
      mentionedAgent = agent;
      break;
    }
  }
  if (!mentionedAgent) return;

  // Show typing indicator for DE
  const typingMsg = {
    id: null,
    msg_id: 'de_typing_' + Date.now(),
    sender_id: 0,
    sender_name: mentionedAgent.name,
    content: '<typing>',
    msg_type: 'text',
    status: 'sent',
    is_read: false,
    created_at: new Date().toISOString(),
    file_url: '',
    file_name: '',
    file_size: 0,
  };
  State.messages.push(typingMsg);
  renderMessages(true);

  try {
    // Build message history for DE
    const messages = [];
    // Add recent context (last 5 messages)
    const recent = State.messages.slice(-6, -1);
    for (const m of recent) {
      if (m.content === '<typing>' || m.content === '<de_reply>') continue;
      const role = m.sender_id === State.currentUser.id ? 'user' : 'assistant';
      messages.push({ role, content: m.content });
    }
    // Add current message (strip @mention prefix for the DE API)
    const cleanContent = content.replace('@' + mentionedAgent.name, '').trim() || '你好';
    messages.push({ role: 'user', content: cleanContent });

    const res = await apiPost('/api/de/chat', {
      agent_id: mentionedAgent.id,
      messages: messages,
      group_id: groupId,
    });

    // Remove typing indicator
    const idx = State.messages.findIndex(m => m.msg_id === typingMsg.msg_id);
    if (idx >= 0) State.messages.splice(idx, 1);

    // Add DE response
    State.messages.push({
      id: null,
      msg_id: 'de_reply_' + Date.now(),
      sender_id: -1,
      sender_name: mentionedAgent.name,
      content: res.reply,
      msg_type: 'text',
      status: 'sent',
      is_read: false,
      created_at: new Date().toISOString(),
      file_url: '',
      file_name: '',
      file_size: 0,
    });
    renderMessages(true);
  } catch(e) {
    // Remove typing, show error
    const idx = State.messages.findIndex(m => m.msg_id === typingMsg.msg_id);
    if (idx >= 0) {
      State.messages[idx].content = '数字员工暂时不可用，请稍后再试';
      State.messages[idx].msg_id = 'de_error_' + Date.now();
    }
    renderMessages(true);
  }
}

// ====== Upload and Send File ======
async function uploadAndSendFile(file, type) {
  if (!State.activeChat) return;
  const formData = new FormData();
  formData.append('file', file);
  try {
    showToast('上传中...', 'info');
    const res = await api('/api/messages/upload', { method: 'POST', body: formData, headers: {} });
    const data = await res.json();
    if (!data.url) { showToast('上传失败', 'error'); return; }

    const { type: chatType, peerId, groupId } = State.activeChat;
    const body = {
      content: type === 'image' ? '[图片]' : `[文件] ${file.name}`,
      content_type: type,
      chat_type: chatType === 'group' ? 'group' : 'single',
      file_url: data.url,
      file_name: file.name,
      file_size: data.size,
    };
    if (chatType === 'single') body.receiver_id = peerId;
    if (chatType === 'group') body.group_id = groupId;

    const msgId = IM.sendChat(body);

    const optimisticMsg = {
      id: null, msg_id: msgId, sender_id: State.currentUser.id,
      sender_name: State.currentUser.nickname,
      content: body.content, msg_type: type, status: 'sending',
      is_read: false, created_at: new Date().toISOString(),
      file_url: data.url, file_name: file.name, file_size: data.size,
    };
    State.messages.push(optimisticMsg);
    renderMessages(true);
    showToast('发送成功', 'success');
  } catch (e) {
    showToast('上传失败: ' + e.message, 'error');
  }
}

// ====== Recall Message ======
function recallMessage(msgId, dbId) {
  if (!confirm('确认撤回这条消息？')) return;
  // Use WebSocket recall if connected, else HTTP fallback
  if (IM.connected && dbId) {
    IM.recall(parseInt(dbId));
    showToast('撤回请求已发送', 'info');
  } else if (msgId) {
    apiPost('/api/messages/' + msgId + '/recall', {}).then(() => {
      showToast('已撤回', 'success');
      loadHistory(false);
    }).catch(() => showToast('撤回失败', 'error'));
  }
}

// ====== WebSocket Event Handlers ======
function onChatReceived(body) {
  if (!State.activeChat) { refreshConversations(); return; }
  const { type: chatType, peerId, groupId } = State.activeChat;

  // Check if this message belongs to the current chat
  const isForCurrentChat = (chatType === 'single' && body.chat_type === 'single' && body.sender_id === peerId) ||
                           (chatType === 'group' && body.chat_type === 'group' && body.group_id === groupId) ||
                           (body.sender_id === State.currentUser.id && chatType === body.chat_type &&
                            ((body.receiver_id === peerId && chatType === 'single') ||
                             (body.group_id === groupId && chatType === 'group')));

  if (isForCurrentChat) {
    // Avoid duplicates
    if (State.messages.some(m => m.msg_id === body.msg_id)) return;
    State.messages.push({
      id: body.db_id, msg_id: body.msg_id, sender_id: body.sender_id,
      sender_name: body.sender_name, content: body.content,
      msg_type: body.content_type, status: body.status || 'delivered',
      is_read: false, created_at: new Date().toISOString(),
      file_url: body.file_url, file_name: body.file_name, file_size: body.file_size,
      receiver_id: body.receiver_id, group_id: body.group_id,
    });
    renderMessages(true);

    // Send read receipt for single chat
    if (chatType === 'single' && body.sender_id !== State.currentUser.id) {
      IM.sendReadReceipt(body.sender_id);
    }
  }

  refreshConversations();
}

function onAckReceived(body) {
  // Update message status based on ACK
  const msg = State.messages.find(m => m.msg_id === body.msg_id);
  if (msg) {
    if (body.status === 'sent') {
      msg.status = 'sent';
      msg.id = body.db_id;
    } else if (body.status === 'failed') {
      msg.status = 'failed';
      showToast('消息发送失败', 'error');
    } else if (body.status === 'recall_failed') {
      showToast(body.reason || '撤回失败', 'error');
    }
    renderMessages(false);
  }
}

function onRecallReceived(body) {
  const msg = State.messages.find(m => m.id === body.db_id || m.msg_id === body.msg_id);
  if (msg) {
    msg.status = 'recalled';
    renderMessages(false);
    showToast('一条消息被撤回', 'info');
  }
}

function onTypingReceived(body) {
  if (!State.activeChat) return;
  const { type, peerId, groupId } = State.activeChat;
  const isForCurrent = (type === 'single' && body.sender_id === peerId) ||
                       (type === 'group' && body.group_id === groupId);
  if (!isForCurrent) return;

  const indicator = document.getElementById('typing-indicator');
  document.getElementById('typing-name').textContent = (body.sender_name || '') + ' 正在输入';
  indicator.classList.remove('hidden');

  clearTimeout(State.typingTimer);
  State.typingTimer = setTimeout(() => indicator.classList.add('hidden'), 3000);
}

function onReadReceiptReceived(body) {
  // Update message status to read
  if (State.activeChat && State.activeChat.type === 'single') {
    State.messages.forEach(m => {
      if (m.sender_id === body.reader_id || m.receiver_id === body.reader_id) {
        m.is_read = true;
      }
    });
    renderMessages(false);
  }
}

function onFriendRequestReceived(body) {
  showToast(body.from_name + ' 请求添加你为好友', 'info');
  loadAllLists();
}

function onFriendAcceptedReceived(body) {
  showToast(body.by_name + ' 接受了你的好友申请', 'success');
  loadAllLists();
}

function onGroupInviteReceived(body) {
  showToast('你被邀请加入群聊' + (body.group_name ? '：' + body.group_name : ''), 'info');
  loadAllLists();
}

// ====== Search Users ======
async function searchUsers(q) {
  try {
    const users = await apiGet('/api/friends/search?q=' + encodeURIComponent(q));
    const results = document.getElementById('search-results');
    if (!users.length) {
      results.innerHTML = '<div class="text-xs text-outline py-2 text-center">无匹配用户</div>';
    } else {
      results.innerHTML = users.map(u => `
        <div class="search-item flex items-center gap-2 p-2 hover:bg-surface-container-high rounded cursor-pointer" data-id="${u.id}" data-name="${escapeHtml(u.nickname || u.username)}">
          <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center flex-shrink-0">
            ${u.avatar ? `<img src="${escapeHtml(u.avatar)}" class="w-full h-full object-cover rounded-full"/>` : '<span class="material-symbols-outlined text-sm text-on-surface-variant">person</span>'}
          </div>
          <div class="min-w-0">
            <p class="text-sm truncate">${escapeHtml(u.nickname || u.username)}</p>
            <p class="text-[10px] text-outline truncate">${escapeHtml(u.signature || '')}</p>
          </div>
        </div>
      `).join('');
      results.querySelectorAll('.search-item').forEach(el => {
        el.addEventListener('click', () => sendFriendRequest(parseInt(el.dataset.id), el.dataset.name));
      });
    }
    results.classList.remove('hidden');
  } catch (e) { console.error('searchUsers:', e); }
}

async function searchUsersInModal(q) {
  try {
    const users = await apiGet('/api/friends/search?q=' + encodeURIComponent(q));
    const container = document.getElementById('modal-search-results');
    if (!users.length) {
      container.innerHTML = '<div class="text-xs text-outline py-2 text-center">无匹配用户</div>';

    }
    container.innerHTML = users.map(u => `
      <div class="flex items-center gap-2 p-2 hover:bg-surface-container-high rounded">
        <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center flex-shrink-0">
          ${u.avatar ? `<img src="${escapeHtml(u.avatar)}" class="w-full h-full object-cover rounded-full"/>` : '<span class="material-symbols-outlined text-sm text-on-surface-variant">person</span>'}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm truncate">${escapeHtml(u.nickname || u.username)}</p>
        </div>
        <button class="px-2 py-1 bg-secondary text-on-secondary text-xs rounded hover:brightness-110 transition-all" data-id="${u.id}" data-name="${escapeHtml(u.nickname || u.username)}">添加</button>
      </div>
    `).join('');
    container.querySelectorAll('button[data-id]').forEach(btn => {

}

async function sendFriendRequest(userId, name) {
  const message = prompt('验证消息：', '我是' + (State.currentUser?.nickname || State.currentUser?.username));
  if (message === null) return;
  try {
    await apiPost('/api/friends/requests', { to_user_id: userId, message: message || '' });
    showToast('好友申请已发送给' + name, 'success');
    closeAllModals();
    await loadAllLists();
  } catch (e) {
    const msg = await e.json?.() || {};
    showToast(msg.detail || '发送失败', 'error');
  }
}

// ====== Create Group Modal ======
async function openCreateGroupModal() {
  // Load friends into member list
  const list = document.getElementById('group-member-list');
  if (!State.friends.length) {
    list.innerHTML = '<div class="text-xs text-outline py-2 text-center">暂无好友，请先添加好友</div>';
  } else {
    list.innerHTML = State.friends.map(f => `
      <label class="flex items-center gap-2 p-2 hover:bg-surface-container-high rounded cursor-pointer">
        <input type="checkbox" value="${f.id}" class="rounded border-outline-variant"/>
        <span class="text-sm">${escapeHtml(f.nickname || f.username)}</span>
      </label>
    `).join('');
  }
  document.getElementById('group-name-input').value = '';
  openModal('modal-create-group');
}

document.getElementById('btn-confirm-create-group')?.addEventListener('click', async () => {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) { showToast('请输入群名称', 'error'); return; }
  const memberIds = Array.from(document.querySelectorAll('#group-member-list input:checked')).map(cb => parseInt(cb.value));
  try {
    await apiPost('/api/groups', { name, member_ids: memberIds });
    showToast('群聊创建成功', 'success');
    closeAllModals();
    await loadAllLists();
  } catch (e) { showToast('创建失败', 'error'); }
});

// ====== Group Members ======
async function loadGroupMembers() {
  if (!State.activeChat || State.activeChat.type !== 'group') return;
  try {
    const members = await apiGet('/api/groups/' + State.activeChat.groupId + '/members');
    const container = document.getElementById('group-member-display');
    container.innerHTML = members.map(m => `
      <div class="flex items-center gap-2 p-2 hover:bg-surface-container-high rounded">
        <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-sm text-on-surface-variant">person</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm truncate">${escapeHtml(m.nickname || m.username)}</p>
          <p class="text-[10px] text-outline">${m.role === 'owner' ? '群主' : m.role === 'admin' ? '管理员' : '成员'}</p>
        </div>
      </div>
    `).join('');
    openModal('modal-group-members');
  } catch (e) { showToast('加载成员失败', 'error'); }
}

// ====== Leave Group ======
async function leaveGroup() {
  if (!State.activeChat || State.activeChat.type !== 'group') return;
  if (!confirm('确认退出群聊？')) return;
  try {
    await apiDelete('/api/groups/' + State.activeChat.groupId + '/leave');
    showToast('已退出群聊', 'success');
    State.activeChat = null;
    document.getElementById('chat-active').classList.add('hidden');
    document.getElementById('chat-empty').classList.remove('hidden');
    await loadAllLists();
  } catch (e) { showToast('退出失败', 'error'); }
}

// ====== Delete Friend ======
async function deleteFriend() {
  if (!State.activeChat || State.activeChat.type !== 'single') return;
  if (!confirm('确认删除该好友？')) return;
  try {
    await apiDelete('/api/friends/' + State.activeChat.peerId);
    showToast('好友已删除', 'success');
    State.activeChat = null;
    document.getElementById('chat-active').classList.add('hidden');
    document.getElementById('chat-empty').classList.remove('hidden');
    await loadAllLists();
  } catch (e) { showToast('删除失败', 'error'); }
}

// ====== Refresh Conversations ======
async function refreshConversations() {
  try {
    State.conversations = await apiGet('/api/messages/conversations');
    if (State.activeTab === 'conversations') renderContactList();

}

// ====== Modal Helpers ======
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}
function closeAllModals() {
  document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));
}

// ====== Typing Indicator Send ======
let lastTypingSend = 0;
document.addEventListener('input', (e) => {
  if (e.target.id === 'msg-input' && State.activeChat && IM.connected) {
    const now = Date.now();
    if (now - lastTypingSend > 2000) {
      lastTypingSend = now;
      const { type, peerId, groupId } = State.activeChat;
      IM.sendTyping(type === 'single' ? peerId : null, type === 'group' ? groupId : null);
    }
  }
});

// ====== @Mention: Load Digital Employees ======
async function loadDEAgents() {
  try {
    State.deAgentList = await apiGet('/api/de/list');
  } catch(e) { console.error('[mention] load DE agents failed:', e); }
}

// ====== @Mention: Input Handler ======
function handleMentionInput(input) {
  const text = input.value;
  const cursorPos = input.selectionStart;

  // Find the last @ before cursor
  const beforeCursor = text.substring(0, cursorPos);
  const atIdx = beforeCursor.lastIndexOf('@');

  if (atIdx === -1) {
    hideMentionPicker();
    return;
  }

  // Check if @ is at start or preceded by whitespace
  if (atIdx > 0 && !/\s/.test(text[atIdx - 1])) {
    hideMentionPicker();
    return;
  }

  // Get query after @
  const query = text.substring(atIdx + 1, cursorPos);

  // If there's a space after @ and some text, close (user finished typing)
  if (query.includes(' ') && query.trim().length > 0) {
    hideMentionPicker();
    return;
  }

  State.mentionActive = true;
  State.mentionQuery = query;
  State.mentionStart = atIdx;
  showMentionPicker(query);
}

function showMentionPicker(query) {
  const picker = document.getElementById('mention-picker');
  const list = document.getElementById('mention-list');
  const filtered = State.deAgentList.filter(a =>
    a.name.toLowerCase().includes(query.toLowerCase())
  );

  if (!filtered.length) {
    hideMentionPicker();
    return;
  }

  list.innerHTML = filtered.map((a, i) => `
    <div class="mention-item flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-surface-variant/50 transition-colors ${i === 0 ? 'bg-surface-variant/30' : ''}" data-agent-id="${a.id}" data-agent-name="${escapeHtml(a.name)}" onclick="insertMention(${a.id}, '${escapeHtml(a.name)}')">
      ${a.avatar ? `<img src="${escapeHtml(a.avatar)}" class="w-6 h-6 rounded-full object-cover"/>` : `<div class="w-6 h-6 rounded-full bg-primary-container/30 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-xs">smart_toy</span></div>`}
      <span class="text-sm text-on-surface">${escapeHtml(a.name)}</span>
      <span class="text-[10px] text-on-surface-variant ml-auto">数字员工</span>
    </div>
  `).join('');

  // Position the picker above the input
  const inputEl = document.getElementById('msg-input');
  const rect = inputEl.getBoundingClientRect();
  picker.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  picker.classList.remove('hidden');
}

function hideMentionPicker() {
  document.getElementById('mention-picker').classList.add('hidden');
  State.mentionActive = false;
  State.mentionStart = -1;
}

let mentionSelectIdx = 0;
function navigateMention(dir) {
  const items = document.querySelectorAll('.mention-item');
  if (!items.length) return;
  items[mentionSelectIdx]?.classList.remove('bg-surface-variant/30');
  mentionSelectIdx = (mentionSelectIdx + dir + items.length) % items.length;
  items[mentionSelectIdx]?.classList.add('bg-surface-variant/30');
}

function selectMention() {
  const items = document.querySelectorAll('.mention-item');
  if (!items.length) return;
  const item = items[mentionSelectIdx] || items[0];
  const agentId = item.dataset.agentId;
  const agentName = item.dataset.agentName;
  insertMention(parseInt(agentId), agentName);
}

function insertMention(agentId, agentName) {
  const input = document.getElementById('msg-input');
  const text = input.value;
  const before = text.substring(0, State.mentionStart);
  const after = text.substring(input.selectionStart);
  const mention = `@${agentName} `;

  input.value = before + mention + after;
  const newPos = (before + mention).length;
  input.focus();
  input.setSelectionRange(newPos, newPos);
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';

  hideMentionPicker();
}

// ====== Start ======
init();
loadDEAgents();
