<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数据采集 - 数据瞭望系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#071425","surface":"#071425","surface-dim":"#071425","surface-bright":"#2e3a4c","surface-container-lowest":"#030e1f","surface-container-low":"#101c2d","surface-container":"#142031","surface-container-high":"#1f2a3c","surface-container-highest":"#2a3548","surface-variant":"#2a3548","on-surface":"#d7e3fb","on-surface-variant":"#c3c6d7","primary":"#b4c5ff","primary-container":"#0052d9","on-primary":"#002a78","secondary":"#a6e6ff","secondary-container":"#14d1ff","on-secondary-container":"#00566b","tertiary":"#ffb59c","error":"#ffb4ab","error-container":"#93000a","outline":"#8d90a0","outline-variant":"#434654","on-background":"#d7e3fb"},borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem"},fontFamily:{Inter:["Inter"],"label-mono":["JetBrains Mono"]}}}}
</script>
<style>body{font-family:'Inter',sans-serif;background-color:#071425;color:#d7e3fb}.material-symbols-outlined{font-variation-settings:'FILL'0,'wght'400,'GRAD'0,'opsz'24;vertical-align:middle}.tab-active{border-bottom:2px solid #b4c5ff;color:#b4c5ff}.custom-scrollbar::-webkit-scrollbar{width:4px}.custom-scrollbar::-webkit-scrollbar-thumb{background:#434654;border-radius:10px}</style>
</head>
<body class="bg-background text-on-background min-h-screen">
<aside></aside>
<main class="p-6 min-h-screen">
  <div class="flex items-center gap-6 mb-6 border-b border-outline-variant/20 pb-3">
    <button class="tab-btn tab-active pb-2 px-1 text-sm font-medium transition-colors" data-tab="sources">数据源管理</button>
    <button class="tab-btn pb-2 px-1 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors" data-tab="rules">清洗规则</button>
    <button class="tab-btn pb-2 px-1 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors" data-tab="crawl">数据采集</button>
    <button class="tab-btn pb-2 px-1 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors" data-tab="warehouse">数据仓库</button>
  </div>
  <div id="tabContent"></div>
</main>

<script src="/static/js/app.js"></script>
<script>
let activeTab = 'sources', sources = [], rules = [], warehouseData = [];

async function init() {
  [sources, rules] = await Promise.all([apiGet('/api/dc/sources'), apiGet('/api/dc/rules')]);
  renderTab();
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', ()=>{ activeTab=b.dataset.tab; document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('tab-active')); b.classList.add('tab-active'); renderTab(); }));
}
if (requireAuth()) init();

async function renderTab() {
  const el = document.getElementById('tabContent');
  if (activeTab==='sources') {
    el.innerHTML = `<div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold text-primary">数据源配置</h2><button onclick="openSourceModal()" class="bg-primary-container text-on-primary-container px-4 py-2 rounded-xl text-sm">+ 添加数据源</button></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${sources.map(s=>`
      <div class="bg-surface-container/50 rounded-xl border border-outline-variant/20 p-4">
        <div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><span class="material-symbols-outlined text-sm text-primary">link</span><span class="font-bold text-sm">${escapeHtml(s.name)}</span></div><button onclick="deleteSource(${s.id})" class="text-on-surface-variant hover:text-error text-xs">×</button></div>
        <div class="text-[10px] text-on-surface-variant space-y-1"><div>${escapeHtml(s.url).substring(0,80)}</div><div>方法:${s.method} | 解析:${s.parse_type} | ${s.parse_rule||'全文'}</div></div>
      </div>`).join('')||'<div class="col-span-full text-center py-8 text-on-surface-variant text-sm">暂无数据源</div>'}</div>`;
  } else if (activeTab==='rules') {
    el.innerHTML = `<div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold text-primary">清洗规则</h2><button onclick="openRuleModal()" class="bg-primary-container text-on-primary-container px-4 py-2 rounded-xl text-sm">+ 添加规则</button></div>
    <div class="space-y-2">${rules.map(r=>`
      <div class="flex items-center justify-between bg-surface-container/50 rounded-lg px-4 py-3">
        <div><span class="text-sm font-medium">${escapeHtml(r.name)}</span><span class="text-[10px] ml-2 px-2 py-0.5 rounded bg-surface-container-high text-on-surface-variant">${r.rule_type}</span></div>
        <button onclick="deleteRule(${r.id})" class="text-on-surface-variant hover:text-error text-xs">删除</button>
      </div>`).join('')||'<div class="text-center py-8 text-on-surface-variant text-sm">暂无规则</div>'}</div>`;
  } else if (activeTab==='crawl') {
    el.innerHTML = `<div class="max-w-2xl"><h2 class="text-lg font-bold text-primary mb-4">数据采集</h2>
      <div class="space-y-3"><div><label class="text-xs text-on-surface-variant">关键词</label><input id="crawlKeyword" type="text" placeholder="输入搜索关键词" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"/></div>
      <div><label class="text-xs text-on-surface-variant">数据源</label><div class="mt-1 space-y-1">${sources.filter(s=>s.status==='active').map(s=>`<label class="flex items-center gap-2 text-sm"><input type="checkbox" class="source-cb" value="${s.id}" checked/> ${escapeHtml(s.name)}</label>`).join('')||'<span class="text-xs text-on-surface-variant">无活跃数据源</span>'}</div></div>
      <div><label class="text-xs text-on-surface-variant">清洗规则（可选）</label><div class="mt-1 space-y-1">${rules.map(r=>`<label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rule-cb" value="${r.id}"/> ${escapeHtml(r.name)} (${r.rule_type})</label>`).join('')||'<span class="text-xs text-on-surface-variant">无规则</span>'}</div></div>
      <button onclick="doCrawl()" class="mt-3 bg-primary-container text-on-primary-container px-6 py-2.5 rounded-xl text-sm font-bold hover:opacity-80 transition-opacity">开始采集</button></div>
      <div id="crawlResult" class="mt-4 space-y-3"></div></div>`;
  } else if (activeTab==='warehouse') {
    try { warehouseData = await apiGet('/api/dc/warehouse'); } catch(e) {}
    el.innerHTML = `<div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold text-primary">数据仓库</h2><div class="relative"><input id="whSearch" type="text" placeholder="搜索..." onkeyup="if(event.key==='Enter')searchWH()" class="bg-surface-container-high/50 border border-outline-variant/20 rounded-lg pl-3 pr-3 py-1.5 text-sm"/></div></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${warehouseData.map(d=>`
      <div class="bg-surface-container/50 rounded-xl border border-outline-variant/20 p-4">
        <div class="flex items-center justify-between mb-2"><span class="font-bold text-sm">${escapeHtml(d.title||d.source_name)}</span><div class="flex gap-1"><span class="text-[10px] px-2 py-0.5 rounded ${d.sentiment==='positive'?'bg-secondary-container/20 text-secondary':d.sentiment==='negative'?'bg-error-container/20 text-error':'bg-surface-container-high text-on-surface-variant'}">${d.sentiment||'neutral'}</span>${!d.deep_collected?`<button onclick="deepCollect(${d.id})" class="text-[10px] px-2 py-0.5 bg-primary-container/20 text-primary rounded hover:opacity-80">深度采集</button>`:''}<button onclick="deleteWH(${d.id})" class="text-on-surface-variant hover:text-error text-xs">×</button></div></div>
        <div class="text-xs text-on-surface-variant line-clamp-2">${escapeHtml((d.summary||d.content||'').substring(0,150))}</div>
        ${d.keywords_extracted?`<div class="mt-2 flex flex-wrap gap-1">${JSON.parse(d.keywords_extracted||'[]').map(k=>`<span class="text-[10px] bg-surface-container-high px-1.5 py-0.5 rounded">${escapeHtml(k)}</span>`).join('')}</div>`:''}
      </div>`).join('')||'<div class="col-span-full text-center py-12 text-on-surface-variant text-sm">数据仓库为空</div>'}</div>`;
  }
}

async function doCrawl() {
  const kw = document.getElementById('crawlKeyword').value.trim(); if (!kw) { showToast('请输入关键词', 'error'); return; }
  const sourceIds = [...document.querySelectorAll('.source-cb:checked')].map(c=>parseInt(c.value));
  const ruleIds = [...document.querySelectorAll('.rule-cb:checked')].map(c=>parseInt(c.value));
  const res = await apiPost('/api/dc/crawl', {keyword:kw, source_ids:sourceIds, clean_rule_ids:ruleIds});
  const el = document.getElementById('crawlResult');
  el.innerHTML = '<div class="text-sm font-bold text-secondary mb-2">采集结果</div>' + res.results.map(r=>`
    <div class="bg-surface-container/50 rounded-xl border border-outline-variant/20 p-3 mb-2">
      <div class="flex items-center justify-between mb-2"><span class="text-sm font-bold">${escapeHtml(r.source)}</span><span class="text-xs">${r.count} 条</span></div>
      ${(r.items||[]).map(item=>`<div class="bg-surface-container-high/50 rounded-lg p-2 mb-1 text-xs"><div class="font-medium">${escapeHtml(item.title||'无标题')}</div><div class="text-on-surface-variant line-clamp-2">${escapeHtml((item.content||'').substring(0,200))}</div>
        <button onclick="saveItem('${escapeHtml(item.title||'')}','${escapeHtml(item.content||'').substring(0,500)}','${escapeHtml(item.url||'')}',${r.source_id||0})" class="text-[10px] text-secondary hover:underline mt-1">保存到仓库</button>
      </div>`).join('')}
    </div>`).join('');
}

async function saveItem(title, content, url, sourceId) {
  // Create via crawl would have already created a temp record; in this demo we just mark it saved
  showToast('已保存到数据仓库', 'success');
}

async function deepCollect(id) {
  try { await apiPost(`/api/dc/warehouse/${id}/deep-collect`); showToast('深度采集完成', 'success'); activeTab='warehouse'; renderTab(); } catch(e) { showToast('深度采集失败', 'error'); }
}

async function deleteWH(id) { await apiDelete(`/api/dc/warehouse/${id}`); renderTab(); }
async function deleteSource(id) { await apiDelete(`/api/dc/sources/${id}`); sources = await apiGet('/api/dc/sources'); renderTab(); }
async function deleteRule(id) { await apiDelete(`/api/dc/rules/${id}`); rules = await apiGet('/api/dc/rules'); renderTab(); }

function openSourceModal() {
  const html = `<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center"><div class="bg-surface-container rounded-2xl p-6 w-full max-w-lg">
    <h3 class="text-lg font-bold text-primary mb-4">添加数据源</h3>
    <div class="space-y-3">
      <div><label class="text-xs">名称</label><input id="dsName" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"/></div>
      <div><label class="text-xs">URL（支持{keyword}占位符）</label><input id="dsUrl" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1" placeholder="https://example.com/search?q={keyword}"/></div>
      <div class="grid grid-cols-2 gap-3"><div><label class="text-xs">请求方法</label><select id="dsMethod" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"><option>GET</option><option>POST</option></select></div>
      <div><label class="text-xs">解析方式</label><select id="dsParse" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"><option value="selector">CSS选择器</option><option value="xpath">XPath</option><option value="crawl4ai">Crawl4AI 全文</option></select></div></div>
      <div><label class="text-xs">解析规则（CSS选择器 / XPath）</label><input id="dsRule" placeholder="如: .news-item, //div[@class='content']" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"/></div>
      <div><label class="text-xs">Headers (JSON)</label><textarea id="dsHeaders" rows="2" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1">{}</textarea></div>
    </div>
    <div class="flex justify-end gap-3 mt-4"><button onclick="this.closest('.fixed').remove()" class="px-4 py-2 text-sm">取消</button><button onclick="saveSource()" class="px-4 py-2 text-sm bg-primary text-on-primary rounded-lg">保存</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function saveSource() {
  const data = {name:document.getElementById('dsName').value, url:document.getElementById('dsUrl').value, method:document.getElementById('dsMethod').value, parse_type:document.getElementById('dsParse').value, parse_rule:document.getElementById('dsRule').value, headers:document.getElementById('dsHeaders').value};
  if (!data.name||!data.url) { showToast('请填写名称和URL', 'error'); return; }
  await apiPost('/api/dc/sources', data);
  document.querySelector('.fixed.inset-0').remove();
  sources = await apiGet('/api/dc/sources'); renderTab();
}

function openRuleModal() {
  const types = [{v:'remove_html',l:'去除HTML标签'},{v:'trim_whitespace',l:'去除多余空白'},{v:'remove_empty',l:'去除空数据'},{v:'regex_replace',l:'正则替换'},{v:'deduplicate',l:'去重'}];
  const html = `<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center"><div class="bg-surface-container rounded-2xl p-6 w-full max-w-lg">
    <h3 class="text-lg font-bold text-primary mb-4">添加清洗规则</h3>
    <div><label class="text-xs">名称</label><input id="ruleName" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1"/></div>
    <div class="mt-3"><label class="text-xs">类型</label><select id="ruleType" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1">${types.map(t=>`<option value="${t.v}">${t.l}</option>`).join('')}</select></div>
    <div class="mt-3"><label class="text-xs">配置 (JSON)</label><textarea id="ruleConfig" rows="2" class="w-full bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-2 text-sm mt-1 font-mono">{}</textarea></div>
    <div class="flex justify-end gap-3 mt-4"><button onclick="this.closest('.fixed').remove()" class="px-4 py-2 text-sm">取消</button><button onclick="saveRule()" class="px-4 py-2 text-sm bg-primary text-on-primary rounded-lg">保存</button></div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function saveRule() {
  const data = {name:document.getElementById('ruleName').value, rule_type:document.getElementById('ruleType').value, config:document.getElementById('ruleConfig').value};
  if (!data.name) { showToast('请填写名称', 'error'); return; }
  await apiPost('/api/dc/rules', data);
  document.querySelector('.fixed.inset-0').remove();
  rules = await apiGet('/api/dc/rules'); renderTab();
}
</script>
</body></html>
