<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>智能审计 - 数据瞭望系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tc">tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#071425","surface":"#071425","surface-container":"#142031","surface-container-high":"#1f2a3c","surface-variant":"#2a3548","on-surface":"#d7e3fb","on-surface-variant":"#c3c6d7","primary":"#b4c5ff","primary-container":"#0052d9","secondary":"#a6e6ff","secondary-container":"#14d1ff","tertiary":"#ffb59c","error":"#ffb4ab","error-container":"#93000a","on-error":"#690005","outline":"#8d90a0","outline-variant":"#434654","on-background":"#d7e3fb"},borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem"},fontFamily:{Inter:["Inter"]}}}}</script>
<style>body{font-family:'Inter',sans-serif;background-color:#071425;color:#d7e3fb}.material-symbols-outlined{font-variation-settings:'FILL'0,'wght'400,'GRAD'0,'opsz'24;vertical-align:middle}.tab-active{border-bottom:2px solid #b4c5ff;color:#b4c5ff}</style></head>
<body class="bg-background text-on-background min-h-screen">
<aside></aside>
<main class="p-6 min-h-screen">
  <div class="flex items-center justify-between mb-4">
    <div><h1 class="text-2xl font-bold text-primary">智能审计</h1><p class="text-sm text-on-surface-variant mt-1">消息敏感度审计 + 数据情感分析 + 封禁管理</p></div>
    <div class="flex gap-3"><input id="auditStart" type="date" class="bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-1.5 text-sm"/><input id="auditEnd" type="date" class="bg-surface-container-high/50 border border-outline-variant/20 rounded-lg px-3 py-1.5 text-sm"/><button onclick="loadAll()" class="bg-primary-container text-on-primary-container px-4 py-1.5 rounded-lg text-sm">查询</button></div>
  </div>
  <div class="flex gap-4 mb-4 border-b border-outline-variant/20 pb-2">
    <button class="tab-btn tab-active pb-2 px-1 text-sm font-medium" data-tab="msgs">消息审计</button>
    <button class="tab-btn pb-2 px-1 text-sm font-medium text-on-surface-variant hover:text-on-surface" data-tab="datas">数据审计</button>
    <button class="tab-btn pb-2 px-1 text-sm font-medium text-on-surface-variant hover:text-on-surface" data-tab="users">用户管理</button>
  </div>
  <div id="tabContent"></div>
</main>
<script src="/static/js/app.js"></script>
<script>
let tab='msgs';
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('tab-active'));b.classList.add('tab-active');loadAll();}));

async function loadAll(){try{
  const s=document.getElementById('auditStart').value, e=document.getElementById('auditEnd').value;
  const params=new URLSearchParams();if(s)params.set('start',s+'T00:00:00');if(e)params.set('end',e+'T23:59:59');
  if(tab==='msgs'){
    const [msgs,stats]=await Promise.all([apiGet('/api/smart-audit/messages?'+params),apiGet('/api/smart-audit/messages/stats?'+params)]);
    const el=document.getElementById('tabContent');
    el.innerHTML=`<div class="grid grid-cols-4 gap-3 mb-4">${['low','medium','high'].map(l=>`<div class="bg-surface-container/50 rounded-xl p-4 text-center border ${l==='high'?'border-error/30':l==='medium'?'border-tertiary/30':'border-secondary/30'}"><div class="text-2xl font-bold ${l==='high'?'text-error':l==='medium'?'text-tertiary':'text-secondary'}">${stats[l]||0}</div><div class="text-xs text-on-surface-variant mt-1">${l==='high'?'高风险':'低风险'}</div></div>`).join('')}<div class="bg-surface-container/50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-primary">${stats.total||0}</div><div class="text-xs text-on-surface-variant mt-1">总计</div></div></div>
    <div class="space-y-2">${msgs.map(m=>`<div class="flex items-center justify-between bg-surface-container/50 rounded-lg px-4 py-3 ${m.risk_level==='high'?'border border-error/30':m.risk_level==='medium'?'border border-tertiary/30':''}"><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="px-2 py-0.5 text-[10px] rounded ${m.risk_level==='high'?'bg-error-container/20 text-error':m.risk_level==='medium'?'bg-tertiary-container/20 text-tertiary':'bg-secondary-container/20 text-secondary'}">${m.risk_level}</span><span class="text-sm">${escapeHtml(m.sender_name||'?'+m.sender_id)}</span></div><div class="text-xs text-on-surface-variant truncate mt-1">${escapeHtml(m.content.substring(0,120))}</div></div><div class="flex gap-2 ml-3">${m.risk_level==='high'?`<button onclick="banUser(${m.sender_id})" class="text-[10px] px-2 py-1 bg-error-container/20 text-error rounded hover:bg-error/20">封禁</button>`:''}${m.group_id?`<button onclick="banGroup(${m.group_id})" class="text-[10px] px-2 py-1 bg-surface-container-high rounded hover:bg-surface-variant">封禁群</button>`:''}</div></div>`).join('')||'<div class="text-center py-8 text-on-surface-variant">暂无消息</div>'}</div>`;
  }else if(tab==='datas'){
    const data=await apiGet('/api/smart-audit/data?'+params);
    document.getElementById('tabContent').innerHTML=`<div class="grid grid-cols-3 gap-3 mb-4">${['positive','neutral','negative'].map(s=>`<div class="bg-surface-container/50 rounded-xl p-4 text-center"><div class="text-2xl font-bold ${s==='positive'?'text-secondary':s==='negative'?'text-error':'text-on-surface-variant'}">${data.filter(d=>d.sentiment===s).length}</div><div class="text-xs text-on-surface-variant mt-1">${s==='positive'?'正面':s==='negative'?'负面':'中性'}</div></div>`).join('')}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-3">${data.map(d=>`<div class="bg-surface-container/50 rounded-xl p-4"><div class="flex items-center justify-between mb-2"><span class="text-sm font-bold">${escapeHtml(d.title||d.source_name)}</span><select onchange="markSentiment(${d.id},this.value)" class="bg-surface-container-high border border-outline-variant/20 rounded px-2 py-1 text-xs"><option ${d.sentiment==='positive'?'selected':''}>positive</option><option ${d.sentiment==='neutral'?'selected':''}>neutral</option><option ${d.sentiment==='negative'?'selected':''}>negative</option></select></div><div class="text-xs text-on-surface-variant line-clamp-2">${escapeHtml(d.summary||'')}</div></div>`).join('')}</div>`;
  }else{
    const users=await apiGet('/api/smart-audit/users');
    document.getElementById('tabContent').innerHTML=`<div class="grid grid-cols-1 md:grid-cols-2 gap-3">${users.map(u=>`<div class="bg-surface-container/50 rounded-xl p-4 flex items-center justify-between"><div><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${u.is_active?'bg-secondary':'bg-error'}"></span><span class="text-sm font-bold">${escapeHtml(u.nickname||u.username)}</span><span class="text-[10px] px-2 py-0.5 rounded bg-surface-container-high">${escapeHtml(u.role)}</span></div><div class="text-xs text-on-surface-variant mt-1">${escapeHtml(u.email)} · ${u.message_count}条消息</div></div><div class="flex gap-2">${u.is_active?`<button onclick="banUser(${u.id})" class="text-[10px] px-2 py-1 bg-error-container/20 text-error rounded">封禁</button>`:`<button onclick="unbanUser(${u.id})" class="text-[10px] px-2 py-1 bg-secondary-container/20 text-secondary rounded">解封</button>`}</div></div>`).join('')}</div>`;
  }
}catch(e){showToast('加载失败','error');}}

async function banUser(id){if(!confirm('确认封禁该用户？其消息将全部撤回'))return;await apiPost('/api/smart-audit/ban/user/'+id+'?reason=违规消息');showToast('已封禁','success');loadAll();}
async function unbanUser(id){await apiPost('/api/smart-audit/ban/user/'+id+'/unban');showToast('已解封','success');loadAll();}
async function banGroup(id){if(!confirm('确认封禁并解散该群？'))return;await apiPost('/api/smart-audit/ban/group/'+id+'?reason=违规');showToast('已封禁群','success');loadAll();}
async function markSentiment(id,v){await apiPost('/api/smart-audit/data/'+id+'/mark-sentiment?sentiment='+v);loadAll();}

if(requireAuth())loadAll();
</script>
</body></html>
