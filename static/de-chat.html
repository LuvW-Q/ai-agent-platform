<script>
let agentList = [];
let currentAgent = null;
let chatHistory = [];
let isWaiting = false;
let speechButton = null;
let voicePlaybackEnabled = true;
const LOCAL_CONVERSATION_KEY = 'ai-agent-platform-local-conversations-v1';
let localConversations = [];
let activeConversationId = null;
let gestureHands = null;
let gestureCamera = null;
let gestureRunning = false;
let stableGesture = '';
let stableGestureStartedAt = 0;
let gestureOnCooldown = false;
const GESTURE_STABLE_MS = 1500;
const GESTURE_AGENT_NAMES = Object.freeze({ victory: '天气助手', fist: '随机音乐', palm: '新闻' });

async function loadVoicePlaybackSetting() {
  try {
    const settings = await apiGet('/api/settings');
    const setting = settings.find(item => item.key === 'voice_enabled');
    voicePlaybackEnabled = !setting || setting.value === 'true' || setting.value === '1';
  } catch (error) {}
}

async function loadAgents() {
  loadLocalConversations();
  try {
    agentList = await apiGet('/api/de/list');
    await loadServerConversations();
    renderAgentList();
    renderConversationList();
  } catch(e) { showToast('加载失败: ' + e.message, 'error'); }
}

async function loadServerConversations() {
  const sessions = await apiGet('/api/de/sessions');
  const localIds = new Set(localConversations.map(item => item.id));
  for (const session of sessions) {
    if (localIds.has(session.id)) continue;
    localConversations.push({
      id: session.id,
      agentId: session.agent_id,
      agentName: session.agent_name,
      title: session.title || '新对话',
      messages: [],
      serverBacked: true,
      updatedAt: session.updated_at
    });
  }
  localConversations.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  saveLocalConversations();
}

function loadLocalConversations() {
  try {
    const stored = JSON.parse(localStorage.getItem(LOCAL_CONVERSATION_KEY) || '[]');
    localConversations = Array.isArray(stored) ? stored.filter(item =>
      item && typeof item.id === 'string' && Number.isInteger(item.agentId) &&
      typeof item.agentName === 'string' && Array.isArray(item.messages)
    ) : [];
  } catch (error) {
    localConversations = [];
    showToast('本机会话列表读取失败，已使用空列表', 'error');
  }
}

function saveLocalConversations() {
  try {
    localStorage.setItem(LOCAL_CONVERSATION_KEY, JSON.stringify(localConversations.slice(0, 30)));
  } catch (error) {
    showToast('本机会话保存失败，当前页面仍可继续对话', 'error');
  }
}

function createLocalConversation(initialMessages = []) {
  if (!currentAgent) return null;
  const firstUserMessage = initialMessages.find(message => message.role === 'user');
  const conversation = {
    id: `local-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`,
    agentId: currentAgent.id,
    agentName: currentAgent.name,
    title: firstUserMessage ? firstUserMessage.content.slice(0, 24) : '新对话',
    messages: initialMessages.map(message => ({ role: message.role, content: message.content })),
    updatedAt: new Date().toISOString()
  };
  localConversations.unshift(conversation);
  activeConversationId = conversation.id;
  saveLocalConversations();
  renderConversationList();
  return conversation;
}

function persistActiveConversation() {
  if (!activeConversationId || !currentAgent) return;
  const conversation = localConversations.find(item => item.id === activeConversationId);
  if (!conversation) return;
  conversation.messages = chatHistory.map(message => ({ role: message.role, content: message.content }));
  const firstUserMessage = conversation.messages.find(message => message.role === 'user');
  conversation.title = firstUserMessage ? firstUserMessage.content.slice(0, 24) : '新对话';
  conversation.updatedAt = new Date().toISOString();
  localConversations.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  saveLocalConversations();
  renderConversationList();
}

function renderConversationList() {
  const list = document.getElementById('conversationList');
  if (!localConversations.length) {
    list.innerHTML = '<div class="py-5 text-center text-xs text-on-surface-variant">选择员工后创建本地会话</div>';
    return;
  }
  list.innerHTML = localConversations.map(conversation => {
    const active = conversation.id === activeConversationId;
    const time = conversation.updatedAt ? new Date(conversation.updatedAt).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }) : '';
    return `<button type="button" onclick="openLocalConversation('${conversation.id}')" class="w-full rounded-lg border p-2 text-left transition-colors ${active ? 'border-secondary-container/40 bg-secondary-container/10' : 'border-transparent hover:bg-surface-container-high/50'}">
      <span class="block truncate text-xs font-medium text-on-surface">${escapeHtml(conversation.title || '新对话')}</span>
      <span class="mt-0.5 flex items-center justify-between gap-2 text-[10px] text-on-surface-variant"><span class="truncate">${escapeHtml(conversation.agentName)}</span><span class="flex-shrink-0">${escapeHtml(time)}</span></span>
    </button>`;
  }).join('');
}

async function openLocalConversation(conversationId) {
  const conversation = localConversations.find(item => item.id === conversationId);
  if (!conversation) {
    showToast('该本机会话不存在', 'error');
    return;
  }
  if (conversation.serverBacked && !conversation.messages.length) {
    const history = await apiGet(`/api/de/${conversation.agentId}/history?session_id=${encodeURIComponent(conversation.id)}`);
    conversation.messages = history.map(message => ({ role: message.role, content: message.content }));
    conversation.serverBacked = false;
    saveLocalConversations();
  }
  await selectAgent(conversation.agentId, { conversationId });
}

function activateLocalConversation(conversation) {
  activeConversationId = conversation.id;
  chatHistory = conversation.messages.map(message => ({ role: message.role, content: message.content }));
  renderMessages();
  if (chatHistory.length) {
    chatHistory.forEach(message => appendMessage(message.role, message.content));
  } else {
    appendMessage('agent', `新的对话已开始。我是${currentAgent.name}，请告诉我你想了解什么。`);
  }
  renderConversationList();
}

function renderAgentList() {
  const list = document.getElementById('agentList');
  if (!agentList.length) {
    list.innerHTML = '<div class="text-center py-8 text-on-surface-variant text-sm">暂无已发布的数字员工</div>';
    return;
  }
  list.innerHTML = agentList.map(a => {
    const avatar = a.avatar
      ? `<img ${protectedImageAttrs(a.avatar)} class="w-10 h-10 rounded-full object-cover"/>`
      : `<div class="w-10 h-10 rounded-full bg-primary-container/30 border border-primary/30 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">smart_toy</span></div>`;
    const isActive = currentAgent && currentAgent.id === a.id;
    return `<button type="button" onclick="selectAgent(${a.id})" class="w-full flex items-center gap-3 p-2 rounded-xl text-left transition-all ${isActive ? 'bg-secondary-container/10 border border-secondary-container/30' : 'hover:bg-surface-variant/30 border border-transparent'}">
      ${avatar}
      <div class="flex-1 min-w-0">
        <h3 class="text-sm font-medium text-on-surface truncate">${escapeHtml(a.name)}</h3>
        <p class="text-[10px] text-on-surface-variant truncate">${escapeHtml(a.model_name || '未绑定模型')}</p>
      </div>
    </button>`;
  }).join('');
}

function filterAgents() {
  const q = document.getElementById('agentSearch').value.toLowerCase();
  const filtered = agentList.filter(a => a.name.toLowerCase().includes(q));
  const list = document.getElementById('agentList');
  if (!filtered.length) { list.innerHTML = '<div class="text-center py-8 text-on-surface-variant text-sm">无匹配结果</div>'; return; }
  list.innerHTML = filtered.map(a => {
    const avatar = a.avatar
      ? `<img ${protectedImageAttrs(a.avatar)} class="w-10 h-10 rounded-full object-cover"/>`
      : `<div class="w-10 h-10 rounded-full bg-primary-container/30 border border-primary/30 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">smart_toy</span></div>`;
    const isActive = currentAgent && currentAgent.id === a.id;
    return `<button type="button" onclick="selectAgent(${a.id})" class="w-full flex items-center gap-3 p-2 rounded-xl text-left transition-all ${isActive ? 'bg-secondary-container/10 border border-secondary-container/30' : 'hover:bg-surface-variant/30 border border-transparent'}">
      ${avatar}
      <div class="flex-1 min-w-0"><h3 class="text-sm font-medium text-on-surface truncate">${escapeHtml(a.name)}</h3><p class="text-[10px] text-on-surface-variant truncate">${escapeHtml(a.model_name || '未绑定模型')}</p></div>
    </button>`;
  }).join('');
}

async function selectAgent(id, options = {}) {
  try {
    if (currentAgent && currentAgent.id === id && !options.conversationId) return;
    persistActiveConversation();
    currentAgent = await apiGet(`/api/de/${id}`);
    chatHistory = [];
    renderAgentList();
    updateChatHeader();
    renderMessages();
    document.getElementById('sendBtn').disabled = false;
    if (options.conversationId) {
      const selected = localConversations.find(item => item.id === options.conversationId);
      if (!selected) throw new Error('本机会话不存在');
      activateLocalConversation(selected);
    } else {
      const latest = localConversations.find(item => item.agentId === id);
      if (latest) {
        activateLocalConversation(latest);
      } else {
        // 服务端接口只按员工返回历史；首次打开时保存为明确的本地快照。
        await loadHistory(id);
        createLocalConversation(chatHistory);
      }
    }
    refreshSendButton();
    closeChatSidebar();
  } catch(e) { showToast('加载详情失败', 'error'); }
}

function openChatSidebar() {
  document.getElementById('deSidebar').classList.add('is-open');
  document.getElementById('deSidebarOverlay').classList.remove('hidden');
}

function closeChatSidebar() {
  document.getElementById('deSidebar').classList.remove('is-open');
  document.getElementById('deSidebarOverlay').classList.add('hidden');
}

async function loadHistory(agentId) {
  try {
    const history = await apiGet(`/api/de/${agentId}/history`);
    if (history && history.length) {
      document.getElementById('chatMessages').innerHTML = '';
      chatHistory = [];
      for (const msg of history) {
        appendMessage(msg.role, msg.content, null, msg.created_at);
        chatHistory.push({ role: msg.role, content: msg.content });
      }
    } else {
      appendMessage('agent', `你好！我是${currentAgent.name}。${currentAgent.description || '请问有什么可以帮助您的？'}`);
    }
  } catch(e) {
    appendMessage('agent', `你好！我是${currentAgent.name}。${currentAgent.description || '请问有什么可以帮助您的？'}`);
  }
}

function updateChatHeader() {
  if (!currentAgent) return;
  document.getElementById('headerName').textContent = currentAgent.name;
  const skills = (currentAgent.skills || []).map(s => s.name).join(', ');
  document.getElementById('headerStatus').textContent = skills ? `技能: ${skills}` : '无绑定技能';
  const avatarEl = document.getElementById('headerAvatar');
  if (currentAgent.avatar) {
    avatarEl.innerHTML = `<img ${protectedImageAttrs(currentAgent.avatar)} class="w-full h-full rounded-full object-cover"/>`;
  } else {
    avatarEl.innerHTML = '<span class="material-symbols-outlined text-primary">smart_toy</span>';
  }
}

function appendMessage(role, content, skillCalls, createdAt) {
  const container = document.getElementById('chatMessages');
  const isUser = role === 'user';
  const bubble = document.createElement('div');
  bubble.className = `chat-message flex items-end gap-2 ${isUser ? 'justify-end' : 'justify-start'}`;
  const avatar = isUser
    ? '<div class="w-8 h-8 rounded-full bg-primary-container/20 border border-primary/30 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-primary text-sm">person</span></div>'
    : (currentAgent && currentAgent.avatar
      ? `<img ${protectedImageAttrs(currentAgent.avatar)} class="w-8 h-8 rounded-full object-cover flex-shrink-0"/>`
      : '<div class="w-8 h-8 rounded-full bg-secondary-container/15 border border-secondary-container/30 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-secondary text-sm">smart_toy</span></div>');
  const time = createdAt ? new Date(createdAt) : new Date();
  bubble.innerHTML = `
    ${isUser ? '' : avatar}
    <div class="message-bubble ${isUser ? 'message-user' : 'message-agent'}">
      ${skillCalls && skillCalls.length ? `<div class="mb-2 flex flex-wrap gap-1">${skillCalls.map(sc => `<span class="skill-badge ${sc.success ? 'bg-secondary-container/20 text-secondary-container' : 'bg-error-container/20 text-error'}"><span class="material-symbols-outlined text-[10px]">${sc.success ? 'check_circle' : 'error'}</span>${escapeHtml(sc.skill)}</span>`).join('')}</div>` : ''}
      <div data-message-content class="text-sm whitespace-pre-wrap">${escapeHtml(content)}</div>
      <div class="mt-1 flex items-center ${isUser ? 'justify-end' : 'justify-between'} gap-3 text-[10px] text-on-surface-variant">
        ${isUser ? '' : '<button type="button" onclick="speakMessage(this)" class="message-action inline-flex items-center gap-1 hover:text-secondary" title="朗读这条回复"><span class="material-symbols-outlined text-sm">volume_up</span><span>朗读</span></button>'}
        <span>${time.toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit'})}</span>
      </div>
    </div>
    ${isUser ? avatar : ''}`;
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const typing = document.createElement('div');
  typing.id = 'typingIndicator';
  typing.className = 'flex justify-start';
  typing.innerHTML = `<div class="message-bubble message-agent flex items-center gap-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (isWaiting) return;
  const input = document.getElementById('chatInput');
  let text = input.value.trim();
  if (!text) return;

  const mentionedAgent = agentList.find(agent => text === `@${agent.name}` || text.startsWith(`@${agent.name} `));
  if (mentionedAgent) {
    if (!currentAgent || currentAgent.id !== mentionedAgent.id) await selectAgent(mentionedAgent.id);
    text = text.slice(mentionedAgent.name.length + 1).trim() || '你好';
  }
  if (!currentAgent) {
    showToast('请先选择数字员工，或输入 @ 进行选择', 'error');
    openMentionPicker();
    return;
  }

  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  persistActiveConversation();
  input.value = '';
  autoResize(input);

  isWaiting = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await apiPost('/api/de/chat', {
      agent_id: currentAgent.id,
      messages: chatHistory,
      session_id: activeConversationId || '',
    });
    hideTyping();
    appendMessage('agent', res.reply, res.skill_calls);

    // Update skill call bar
    if (res.skill_calls && res.skill_calls.length) {
      const bar = document.getElementById('skillCallBar');
      bar.classList.remove('hidden');
      bar.innerHTML = `<span class="text-[10px] text-on-surface-variant">技能调用:</span> ` + res.skill_calls.map(sc =>
        `<span class="skill-badge ${sc.success ? 'bg-secondary-container/20 text-secondary-container' : 'bg-error-container/20 text-error'}"><span class="material-symbols-outlined text-[10px]">${sc.success ? 'check_circle' : 'error'}</span>${escapeHtml(sc.skill)}</span>`
      ).join(' ');
    }

    chatHistory.push({ role: 'assistant', content: res.reply });
    persistActiveConversation();
  } catch(e) {
    hideTyping();
    appendMessage('agent', '抱歉，服务暂时不可用，请稍后再试。');
  } finally {
    isWaiting = false;
    refreshSendButton();
  }
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleChatInput(el) {
  autoResize(el);
  const beforeCursor = el.value.slice(0, el.selectionStart);
  const match = beforeCursor.match(/(?:^|\s)@([^\s@]*)$/);
  if (match) renderMentionPicker(match[1]);
  else closeMentionPicker();
  refreshSendButton();
}

function renderMentionPicker(query = '') {
  const picker = document.getElementById('mentionPicker');
  const normalized = query.toLocaleLowerCase('zh-CN');
  const agents = agentList.filter(agent => agent.name.toLocaleLowerCase('zh-CN').includes(normalized));
  picker.innerHTML = agents.length ? agents.map(agent => `
    <button type="button" onclick="chooseMention(${agent.id})" class="w-full flex items-center gap-3 rounded-lg p-2 text-left hover:bg-surface-container-high transition-colors">
      <span class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">smart_toy</span></span>
      <span class="min-w-0"><span class="block text-sm font-medium truncate">${escapeHtml(agent.name)}</span><span class="block text-[10px] text-on-surface-variant truncate">${escapeHtml(agent.description || agent.model_name || '数字员工')}</span></span>
    </button>`).join('') : '<div class="px-3 py-4 text-center text-xs text-on-surface-variant">没有匹配的数字员工</div>';
  picker.classList.remove('hidden');
}

function openMentionPicker() {
  const input = document.getElementById('chatInput');
  if (!input.value.endsWith('@')) input.value += input.value && !input.value.endsWith(' ') ? ' @' : '@';
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  renderMentionPicker('');
  refreshSendButton();
}

async function chooseMention(id) {
  const agent = agentList.find(item => item.id === id);
  if (!agent) return;
  const input = document.getElementById('chatInput');
  const beforeCursor = input.value.slice(0, input.selectionStart);
  const afterCursor = input.value.slice(input.selectionStart);
  const replaced = beforeCursor.replace(/(^|\s)@[^\s@]*$/, (match, prefix) => `${prefix}@${agent.name} `);
  input.value = replaced + afterCursor;
  closeMentionPicker();
  await selectAgent(id);
  input.focus();
  input.setSelectionRange(replaced.length, replaced.length);
}

function closeMentionPicker() {
  document.getElementById('mentionPicker').classList.add('hidden');
}

function refreshSendButton() {
  const text = document.getElementById('chatInput').value.trim();
  const hasMention = agentList.some(agent => text === `@${agent.name}` || text.startsWith(`@${agent.name} `));
  document.getElementById('sendBtn').disabled = isWaiting || !text || (!currentAgent && !hasMention);
}

function newConversation() {
  if (!currentAgent) {
    showToast('请先选择数字员工', 'error');
    return;
  }
  window.speechSynthesis?.cancel();
  persistActiveConversation();
  chatHistory = [];
  createLocalConversation();
  renderMessages();
  appendMessage('agent', `新的对话已开始。我是${currentAgent.name}，请告诉我你想了解什么。`);
  document.getElementById('chatInput').value = '';
  refreshSendButton();
  showToast('已创建新的对话上下文', 'success');
}

async function toggleGestureMode() {
  if (gestureRunning) stopGestureMode();
  else await startGestureMode();
}

async function startGestureMode() {
  const panel = document.getElementById('gesturePanel');
  panel.classList.remove('hidden');
  document.getElementById('gestureCameraHint').classList.remove('hidden');
  document.getElementById('gestureCameraHint').textContent = '正在申请摄像头权限…';
  document.getElementById('gestureStatus').textContent = '正在初始化 MediaPipe Hands…';
  if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
    const message = window.isSecureContext
      ? '当前浏览器不支持摄像头 API，无法启用手势模式。'
      : '手势模式需要 HTTPS 或 localhost 安全上下文；远程 HTTP 演示页无法调用摄像头。';
    gestureRunning = false;
    document.getElementById('gestureCameraHint').textContent = '摄像头不可用';
    document.getElementById('gestureStatus').textContent = message;
    showToast(message, 'error');
    return;
  }
  if (!window.Hands || !window.Camera) {
    document.getElementById('gestureStatus').textContent = 'MediaPipe 组件加载失败，请检查网络';
    return;
  }
  try {
    gestureHands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
    });
    gestureHands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });
    gestureHands.onResults(handleGestureResults);
    const video = document.getElementById('gestureVideo');
    gestureCamera = new Camera(video, {
      onFrame: async () => {
        if (gestureRunning && gestureHands) await gestureHands.send({ image: video });
      },
      width: 640,
      height: 360
    });
    gestureRunning = true;
    await gestureCamera.start();
    document.getElementById('gestureCameraHint').classList.add('hidden');
    document.getElementById('gestureStatus').textContent = '等待手势：剪刀手、握拳或手掌';
    document.getElementById('gestureToggleBtn').classList.add('text-secondary', 'border', 'border-secondary-container/40');
  } catch (error) {
    gestureRunning = false;
    document.getElementById('gestureCameraHint').textContent = '摄像头启动失败';
    document.getElementById('gestureStatus').textContent = error.message;
  }
}

function stopGestureMode() {
  gestureRunning = false;
  stableGesture = '';
  stableGestureStartedAt = 0;
  document.getElementById('gestureProgress').style.width = '0%';
  if (gestureCamera) {
    gestureCamera.stop();
    gestureCamera = null;
  }
  const video = document.getElementById('gestureVideo');
  if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
  video.srcObject = null;
  if (gestureHands) {
    gestureHands.close();
    gestureHands = null;
  }
  document.getElementById('gesturePanel').classList.add('hidden');
  document.getElementById('gestureToggleBtn').classList.remove('text-secondary', 'border', 'border-secondary-container/40');
}

function classifyGesture(landmarks) {
  if (!Array.isArray(landmarks) || landmarks.length !== 21) return '';
  const extended = [
    landmarks[8].y < landmarks[6].y - 0.025,
    landmarks[12].y < landmarks[10].y - 0.025,
    landmarks[16].y < landmarks[14].y - 0.025,
    landmarks[20].y < landmarks[18].y - 0.025
  ];
  const folded = [
    landmarks[8].y > landmarks[6].y + 0.015,
    landmarks[12].y > landmarks[10].y + 0.015,
    landmarks[16].y > landmarks[14].y + 0.015,
    landmarks[20].y > landmarks[18].y + 0.015
  ];
  if (extended[0] && extended[1] && folded[2] && folded[3]) return 'victory';
  if (folded.every(Boolean)) return 'fist';
  if (extended.every(Boolean)) return 'palm';
  return '';
}

function handleGestureResults(results) {
  if (!gestureRunning || gestureOnCooldown) return;
  const landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];
  const gesture = landmarks ? classifyGesture(landmarks) : '';
  const status = document.getElementById('gestureStatus');
  const progress = document.getElementById('gestureProgress');
  if (!gesture) {
    stableGesture = '';
    stableGestureStartedAt = 0;
    progress.style.width = '0%';
    status.textContent = landmarks ? '手势不匹配，请调整手型' : '未检测到手，请将手掌放入画面';
    return;
  }
  const labels = { victory: '剪刀手', fist: '握拳', palm: '手掌' };
  if (gesture !== stableGesture) {
    stableGesture = gesture;
    stableGestureStartedAt = performance.now();
  }
  const elapsed = performance.now() - stableGestureStartedAt;
  const percent = Math.min(100, elapsed / GESTURE_STABLE_MS * 100);
  progress.style.width = `${percent}%`;
  status.textContent = `已识别${labels[gesture]}，请保持 ${(Math.max(0, GESTURE_STABLE_MS - elapsed) / 1000).toFixed(1)} 秒`;
  if (elapsed >= GESTURE_STABLE_MS) {
    stableGesture = '';
    stableGestureStartedAt = 0;
    progress.style.width = '0%';
    gestureOnCooldown = true;
    triggerGestureAction(gesture).finally(() => {
      setTimeout(() => { gestureOnCooldown = false; }, 3000);
    });
  }
}

async function triggerGestureAction(gesture) {
  const agentName = GESTURE_AGENT_NAMES[gesture];
  if (!agentName) return;
  const status = document.getElementById('gestureStatus');
  const agent = agentList.find(item => item.name === agentName);
  if (!agent) {
    const message = `手势目标“${agentName}”不在已发布员工列表中，未发送消息。`;
    status.textContent = message;
    showToast(message, 'error');
    return;
  }
  status.textContent = `正在触发 @${agent.name}`;
  await selectAgent(agent.id);
  const input = document.getElementById('chatInput');
  input.value = `@${agent.name}`;
  refreshSendButton();
  await sendMessage();
  status.textContent = `已触发 @${agent.name}`;
}

function speakMessage(button) {
  if (!voicePlaybackEnabled) {
    showToast('管理员已关闭语音播报', 'info');
    return;
  }
  if (!('speechSynthesis' in window)) {
    showToast('当前浏览器不支持语音播报', 'error');
    return;
  }
  const content = button.closest('.message-bubble')?.querySelector('[data-message-content]')?.textContent?.trim();
  if (!content) return;
  if (speechButton === button && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    speechButton = null;
    return;
  }
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(content);
  utterance.lang = 'zh-CN';
  utterance.rate = 1;
  utterance.onend = () => { speechButton = null; };
  utterance.onerror = () => { speechButton = null; showToast('语音播报失败', 'error'); };
  speechButton = button;
  window.speechSynthesis.speak(utterance);
}

async function exportChatPdf() {
  if (!currentAgent || !document.querySelector('#chatMessages .chat-message')) {
    showToast('当前没有可导出的对话', 'error');
    return;
  }
  if (!window.html2canvas || !window.jspdf?.jsPDF) {
    showToast('PDF 组件加载失败，请检查网络后重试', 'error');
    return;
  }
  const button = document.getElementById('exportPdfBtn');
  const container = document.getElementById('chatMessages');
  const previous = { height: container.style.height, overflow: container.style.overflow, maxHeight: container.style.maxHeight };
  button.disabled = true;
  showToast('正在生成 PDF...', 'info');
  try {
    container.style.height = 'auto';
    container.style.maxHeight = 'none';
    container.style.overflow = 'visible';
    const canvas = await html2canvas(container, { backgroundColor: '#f4f8ff', scale: 1.5, useCORS: true, logging: false });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const margin = 10;
    const imageWidth = pageWidth - margin * 2;
    const imageHeight = canvas.height * imageWidth / canvas.width;
    const image = canvas.toDataURL('image/jpeg', 0.92);
    let y = margin;
    pdf.addImage(image, 'JPEG', margin, y, imageWidth, imageHeight);
    let remaining = imageHeight - (pageHeight - margin * 2);
    while (remaining > 0) {
      pdf.addPage();
      y = margin - (imageHeight - remaining);
      pdf.addImage(image, 'JPEG', margin, y, imageWidth, imageHeight);
      remaining -= pageHeight - margin * 2;
    }
    const safeName = currentAgent.name.replace(/[\\/:*?"<>|]/g, '_');
    pdf.save(`${safeName}-对话-${new Date().toISOString().slice(0, 10)}.pdf`);
    showToast('PDF 已生成', 'success');
  } catch (error) {
    showToast('PDF 生成失败: ' + error.message, 'error');
  } finally {
    Object.assign(container.style, previous);
    button.disabled = false;
  }
}

async function clearChat() {
  if (activeConversationId) {
    try { await apiDelete('/api/de/sessions/' + encodeURIComponent(activeConversationId)); }
    catch (error) { showToast('服务端历史清空失败，请稍后重试', 'error'); return; }
  }
  chatHistory = [];
  persistActiveConversation();
  renderMessages();
  document.getElementById('skillCallBar').classList.add('hidden');
  if (currentAgent) {
    appendMessage('agent', `对话已重置。我是${currentAgent.name}，有什么可以帮助您的？`);
  }
}

function renderMessages() {
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('skillCallBar').classList.add('hidden');
}

if (requireAuth()) {
  loadVoicePlaybackSetting();
  loadAgents();
}
